services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: quiz-master-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8085}
      DB_PATH: ${DB_PATH:-/app/data/quiz.db}
      ENV: ${ENV:-production}
      QUIZZES_DIR: ${QUIZZES_DIR:-quizzes}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_TTL: ${JWT_TTL:-24h}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
    ports:
      - "${PORT:-8085}:8085"
    volumes:
      - ./data:/app/data
      - ./quizzes:/app/quizzes:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8085/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - quiz-network

networks:
  quiz-network:
    driver: bridge
