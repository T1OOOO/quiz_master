services:
  auth:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: quiz-master-auth
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${AUTH_PORT:-8092}
      DB_DRIVER: ${AUTH_DB_DRIVER:-sqlite}
      DB_DSN: ${AUTH_DB_DSN:-}
      DB_PATH: ${AUTH_DB_PATH:-/app/data/auth.db}
      ENV: ${ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      AUTH_API_TOKEN: ${AUTH_API_TOKEN:-dev-auth-token}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      WS_ALLOWED_ORIGINS: ${WS_ALLOWED_ORIGINS:-}
      AUTH_RATE_LIMIT_RPS: ${AUTH_RATE_LIMIT_RPS:-5}
      AUTH_RATE_LIMIT_BURST: ${AUTH_RATE_LIMIT_BURST:-10}
      JWT_TTL: ${JWT_TTL:-24h}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_SERVICE_NAME: ${OTEL_AUTH_SERVICE_NAME:-quiz-master-auth}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-otel-collector:4317}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-1}
    command: ["./quiz-auth"]
    ports:
      - "${AUTH_PORT:-8092}:8092"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8092/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - quiz-network

  storage:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: quiz-master-storage
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${STORAGE_PORT:-8093}
      DB_DRIVER: ${STORAGE_DB_DRIVER:-sqlite}
      DB_DSN: ${STORAGE_DB_DSN:-}
      DB_PATH: ${STORAGE_DB_PATH:-/app/data/storage.db}
      ENV: ${ENV:-production}
      QUIZZES_DIR: ${QUIZZES_DIR:-quizzes}
      STORAGE_API_TOKEN: ${STORAGE_API_TOKEN:-dev-storage-token}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      WS_ALLOWED_ORIGINS: ${WS_ALLOWED_ORIGINS:-}
      AUTH_RATE_LIMIT_RPS: ${AUTH_RATE_LIMIT_RPS:-5}
      AUTH_RATE_LIMIT_BURST: ${AUTH_RATE_LIMIT_BURST:-10}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_SERVICE_NAME: ${OTEL_STORAGE_SERVICE_NAME:-quiz-master-storage}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-otel-collector:4317}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-1}
    command: ["./quiz-storage"]
    ports:
      - "${STORAGE_PORT:-8093}:8093"
    volumes:
      - ./data:/app/data
      - ./quizzes:/app/quizzes:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8093/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - quiz-network

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: quiz-master-server
    restart: unless-stopped
    depends_on:
      auth:
        condition: service_healthy
      storage:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8090}
      ENV: ${ENV:-production}
      QUIZZES_DIR: ${QUIZZES_DIR:-quizzes}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_TTL: ${JWT_TTL:-24h}
      AUTH_API_URL: ${AUTH_API_URL:-http://auth:8092}
      AUTH_API_TOKEN: ${AUTH_API_TOKEN:-dev-auth-token}
      STORAGE_API_URL: ${STORAGE_API_URL:-http://storage:8093}
      STORAGE_API_TOKEN: ${STORAGE_API_TOKEN:-dev-storage-token}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      WS_ALLOWED_ORIGINS: ${WS_ALLOWED_ORIGINS:-}
      AUTH_RATE_LIMIT_RPS: ${AUTH_RATE_LIMIT_RPS:-5}
      AUTH_RATE_LIMIT_BURST: ${AUTH_RATE_LIMIT_BURST:-10}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-quiz-master-server}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-otel-collector:4317}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-1}
    command: ["./quiz-server"]
    ports:
      - "${PORT:-8090}:8090"
    volumes:
      - ./data:/app/data
      - ./quizzes:/app/quizzes:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8090/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - quiz-network

  prometheus:
    image: prom/prometheus:latest
    container_name: quiz-master-prometheus
    depends_on:
      server:
        condition: service_healthy
      auth:
        condition: service_healthy
      storage:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped
    networks:
      - quiz-network

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: quiz-master-blackbox
    expose:
      - "9115"
    volumes:
      - ./deploy/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    restart: unless-stopped
    networks:
      - quiz-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: quiz-master-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    restart: unless-stopped
    networks:
      - quiz-network

  loki:
    image: grafana/loki:3.5.5
    container_name: quiz-master-loki
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command:
      - "-config.file=/etc/loki/config.yml"
    restart: unless-stopped
    networks:
      - quiz-network

  tempo:
    image: grafana/tempo:latest
    container_name: quiz-master-tempo
    ports:
      - "3200:3200"
    volumes:
      - ./deploy/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/tmp/tempo
    command:
      - "-config.file=/etc/tempo.yml"
    restart: unless-stopped
    networks:
      - quiz-network

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: quiz-master-otel-collector
    depends_on:
      tempo:
        condition: service_started
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./deploy/otel-collector/config.yml:/etc/otelcol/config.yaml:ro
    command:
      - "--config=/etc/otelcol/config.yaml"
    restart: unless-stopped
    networks:
      - quiz-network

  promtail:
    image: grafana/promtail:3.5.5
    container_name: quiz-master-promtail
    depends_on:
      loki:
        condition: service_started
    volumes:
      - ./deploy/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - "-config.file=/etc/promtail/config.yml"
    restart: unless-stopped
    networks:
      - quiz-network

  grafana:
    image: grafana/grafana:12.1.1
    container_name: quiz-master-grafana
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - quiz-network

networks:
  quiz-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
