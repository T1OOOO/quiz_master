id: 'home_alone_1_part_1'
title: 'Один дома 1 (Часть 1)'
description: 'Квиз по первому фильму "Один дома" (1990).'
category: 'Кино'

questions:
- id: q_ha1_p1_1
  type: choice
  difficulty: 1
  text: Как звали главного героя?
  options:
  - Кевин
  - Базз
  - Фуллер
  - Гарри
  - Марв
  - Питер
  correct_answer: 0
  explanation: Главного героя зовут Кевин Маккаллистер. Эту роль исполнил Маколей Калкин, и она принесла ему мировую славу.
- id: q_ha1_p1_2
  type: choice
  difficulty: 2
  text: Куда улетела семья Маккаллистеров?
  options:
  - В Лондон
  - В Париж
  - В Майами
  - В Нью-Йорк
  - В Токио
  - В Рим
  correct_answer: 1
  explanation: В начале фильма семья Маккаллистеров собирается провести рождественские каникулы в Париже.
- id: q_ha1_p1_3
  type: choice
  difficulty: 3
  text: Что в первую очередь искали 'Мокрые бандиты' в домах?
  options:
  - Золотые зубы
  - Бытовую технику и электронику
  - Ёлочные игрушки
  - Серебряный сервиз
  - Драгоценные картины
  - Наличные деньги
  correct_answer: 1
  explanation: Бандиты Гарри и Марв называют себя «Мокрыми бандитами» (Wet Bandits), потому что Марв оставляет краны открытыми, затапливая ограбленные дома. Они искали ценные вещи, которые легко продать.
- id: q_ha1_p1_4
  type: choice
  difficulty: 7
  text: Как звали соседского мальчика, которого при пересчете детей по головам в первой части ошибочно приняли за Кевина?
  options:
  - Митч Мерфи
  - Род Мерфи
  - Бобби Биггс
  - Томми Ли
  - Джордж Уилсон
  - Пит Стэнли
  correct_answer: 0
  explanation: Виновником путаницы был назойливый соседский ребенок Митч Мерфи, который лез под руки во время подсчета.
- id: q_ha1_p1_5
  type: choice
  difficulty: 6
  text: Что именно Кевин случайно выбросил в мусорное ведро вместе с мокрыми салфетками после того, как разлилось молоко?
  options:
  - Свой паспорт
  - Свой авиабилет
  - Деньги отца
  - Посадочный талон мамы
  - Багажную бирку
  - Список покупок
  correct_answer: 1
  explanation: На кухне отец случайно выбросил авиабилет Кевина в мусорное ведро вместе с салфетками.
- id: q_ha1_p1_6
  type: choice
  difficulty: 5
  text: Какой подарок дал Кевину Санта-Клаус (которого Кевин встретил на улице) в первой части, так как у него закончились конфеты?
  options:
  - Жвачку Orbit
  - Пачку Tic Tac
  - Леденец на палочке
  - Шоколадную монету
  - Мятную таблетку Rolo
  - Визитку
  correct_answer: 1
  explanation: Санта-Клаус дал Кевину конфету Tic Tac, так как у него закончились подарки.
- id: q_ha1_p1_7
  type: choice
  difficulty: 4
  text: Чем именно Кевин стрелял в Базза в его комнате в первой части (из-за чего началась драка на кухне)?
  options:
  - Он не стрелял, он взял паука
  - Из водяного пистолета
  - Из пневматического ружья (BB gun)
  - Из рогатки
  - Из арбалета
  - Из хлопушки
  correct_answer: 2
  explanation: Кевин выстрелил в Базза из пневматического ружья (BB gun), которое нашел в сундуке.
- id: q_ha1_p1_8
  type: choice
  difficulty: 5
  text: Сколько коробок с пиццей сбил курьер статуей у дома Маккалистеров в первом фильме?
  options:
  - Ни одной (статуя упала на машину, пиццы он удержал)
  - Одну
  - Все, что были в руках
  - Он не сбивал их, он уронил их на снег
  - Шесть
  - Две
  correct_answer: 0
  explanation: Водитель доставки Little Nero's сбил статую жокея своей машиной, но пиццы не пострадали.
- id: q_ha1_p1_9
  type: choice
  difficulty: 4
  text: Что именно ест Кевин, когда Гарри и Марв впервые видят его через окно в первой части?
  options:
  - Попкорн
  - Мороженое
  - Хлопья с молоком
  - Печенье
  - Чипсы
  - Бутерброд
  correct_answer: 1
  explanation: Когда бандиты заглянули в окно, Кевин ел огромную порцию мороженого («Три шарика! Мне не за руль!»).
- id: q_ha1_p1_10
  type: choice
  difficulty: 6
  text: Какого цвета была зубная щетка, которую Кевин выбрал в магазине в первой части?
  options:
  - Синяя
  - Красная
  - Зеленая
  - Желтая
  - Белая
  - Фиолетовая
  correct_answer: 1
  explanation: Зубная щетка была красной.
- id: q_ha1_p1_11
  type: choice
  difficulty: 3
  text: Как называлась пиццерия, которая привезла еду в первой части?
  options:
  - Domino's
  - Pizza Hut
  - Little Nero's Pizza
  - Big Caesar's Pizza
  - Chicago Best Slice
  - Home Town Pizza
  correct_answer: 2
  explanation: Пиццерия называется «Little Nero's Pizza».
- id: q_ha1_p1_12
  type: choice
  difficulty: 4
  text: Какое прозвище дали соседу с лопатой (старику Марли) местные дети в первом фильме?
  options:
  - Убийца с лопатой
  - Убийца с лопатой из Саут-Бенда (South Bend Shovel Slayer)
  - Снежный маньяк
  - Чикагский потрошитель
  - Старый могильщик
  - Ледяной убийца
  correct_answer: 1
  explanation: Дети дразнили его прозвищем «Убийца с лопатой из Саут-Бенда».
- id: q_ha1_p1_13
  type: choice
  difficulty: 5
  text: Какая песня играет во время монтажа, когда Кевин готовит ловушки в доме («План сражения») в первой части?
  options:
  - Carol of the Bells
  - O Holy Night
  - Deck the Halls
  - Jingle Bells (Rock version)
  - We Wish You a Merry Christmas
  - Silent Night
  correct_answer: 0
  explanation: Звучит «Carol of the Bells».
- id: q_ha1_p1_14
  type: choice
  difficulty: 6
  text: На каком музыкальном инструменте играл Гас Полински (Джон Кэнди)?
  options:
  - Аккордеон
  - Гитара
  - Кларнет
  - Труба
  - Скрипка
  - Барабан
  correct_answer: 2
  explanation: Король Польки Среднего Запада играл на кларнете.
- id: q_ha1_p1_15
  type: choice
  difficulty: 3
  text: Что Кевин использовал, чтобы спуститься по лестнице во двор в первой части?
  options:
  - Скейтборд
  - Санки (тобогган)
  - Лыжи
  - Ковер
  - Кусок картона
  - Крышку от мусорного бака
  correct_answer: 1
  explanation: Кевин спустился на красных санках (тобоггане).
- id: q_ha1_p1_16
  type: choice
  difficulty: 8
  text: Какой марки лосьон после бритья Кевин нанес на лицо в знаменитой сцене крика (Один дома 1)?
  options:
  - Old Spice
  - Brut
  - Aqua Velva
  - Gillette
  - Mennen
  - Nivea
  correct_answer: 2
  explanation: В сценарии и косвенно в фильме это Aqua Velva (хотя этикетка может быть скрыта, но это канон).
- id: q_ha1_p1_17
  type: choice
  difficulty: 2
  text: Какую фразу Кевин сказал Санте в первой части перед уходом?
  options:
  - Я хочу игрушки
  - Где мои родители?
  - Я не хочу никаких подарков, просто верни мою семью
  - Дай мне денег
  - Счастливого Рождества
  - Ты настоящий?
  correct_answer: 2
  explanation: «Я не хочу подарков, верни мне мою семью».
- id: q_ha1_p1_18
  type: choice
  difficulty: 4
  text: Какой предмет коллекционирования Марв маниакально воровал из каждого дома в первой части?
  options:
  - Золотые часы
  - Монеты
  - Стеклянные снежные шары (Snow Globes)
  - Фарфоровые статуэтки
  - Серебряные ложки
  - Хрустальные бокалы
  correct_answer: 2
  explanation: Марв крал снежные шары (Snow Globes).
- id: q_ha1_p1_19
  type: choice
  difficulty: 5
  text: Какую именно взятку Кейт Маккалистер предлагала пожилой паре в аэропорту, чтобы выкупить их билеты?
  options:
  - Шубу
  - Кредитную карту мужа
  - Часы, кольцо, серьги и карманный переводчик
  - Билеты в первый класс на следующий рейс
  - Чек на 1000 долларов
  - Свою машину
  correct_answer: 2
  explanation: Она предлагала драгоценности (часы, кольцо, серьги) и 500 долларов.
- id: q_ha1_p1_20
  type: choice
  difficulty: 9
  text: 'Интересный факт: кто на самом деле изображен на фотографии «девушки Базза»?'
  options:
  - Реальная девушка актера
  - Дочь режиссера
  - Мальчик (сын арт-директора) в парике
  - Молодая актриса массовки
  - Сестра Маколея Калкина
  - Компьютерная графика
  correct_answer: 2
  explanation: Это был мальчик в парике, так как режиссер не хотел обижать реальную девочку.
- id: q_ha1_p1_21
  type: choice
  difficulty: 8
  text: Какой номер был у рейса, на котором семья Маккалистеров улетела в Париж?
  options:
  - Рейс 112
  - Рейс 170
  - Рейс 225
  - Рейс 747
  - Рейс 85
  - Рейс 330
  correct_answer: 1
  explanation: Рейс 170 American Airlines.
- id: q_ha1_p1_22
  type: choice
  difficulty: 3
  text: Какой тяжелый предмет падает на лицо Марва в подвале в первой части?
  options:
  - Кирпич
  - Паровой утюг
  - Мешок с мукой
  - Банка с краской
  - Старый ботинок
  - Ящик с гвоздями
  correct_answer: 1
  explanation: На Марва упал утюг.
- id: q_ha1_p1_23
  type: choice
  difficulty: 3
  text: На что наступает Марв босыми ногами, когда влезает через окно в первой части?
  options:
  - На гвозди
  - На конструктор LEGO
  - На стеклянные елочные игрушки
  - На битое стекло от окна
  - На канцелярские кнопки
  - На острые камни
  correct_answer: 2
  explanation: На елочные игрушки.
- id: q_ha1_p1_24
  type: choice
  difficulty: 5
  text: Какая песня играет, когда семья Маккалистеров в панике бежит по терминалу аэропорта?
  options:
  - Jingle Bell Rock
  - Run Rudolph Run
  - Santa Claus is Coming to Town
  - Holiday Flight
  - Christmas Vacation
  - Little Saint Nick
  correct_answer: 1
  explanation: Играет «Run Rudolph Run».
- id: q_ha1_p1_25
  type: choice
  difficulty: 4
  text: Как звали родных сестер Кевина?
  options:
  - Сара и Джессика
  - Линни и Меган
  - Хезер и Трейси
  - Кейт и Элли
  - Бритни и Сьюзан
  - Моника и Рэйчел
  correct_answer: 1
  explanation: Линни и Меган.