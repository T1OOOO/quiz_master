id: 'home_alone_2_part_3'
title: 'Один дома 2 (Часть 3)'
description: 'Квиз по второму фильму "Один дома 2: Затерянный в Нью-Йорке" (1992).'
category: 'Кино'

questions:
- id: q_ha2_p3_1
  type: choice
  difficulty: 6
  text: Какой марки был фотоаппарат у туриста, которого Кевин попросил сфотографировать его возле елки?
  options:
  - Polaroid
  - Nikon
  - Canon
  - Kodak
  - Sony
  - Leica
  correct_answer: 0
  explanation: Это был фотоаппарат моментальной печати Polaroid.
- id: q_ha2_p3_2
  type: choice
  difficulty: 4
  text: На чем поскользнулись бандиты (особенно Гарри) на улице во время погони, когда наступили на рассыпанные шарики?
  options:
  - На жемчужных бусах (бисере)
  - На льду
  - На шариках от подшипников
  - На горохе
  - На конфетах
  - На камнях
  correct_answer: 0
  explanation: Кевин рассыпал скользкие жемчужные бусины (beads) на асфальте.
- id: q_ha2_p3_3
