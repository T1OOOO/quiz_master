id: 'phobias_nature'
title: 'Страх явлений природы'
description: 'Интересные факты о человеческой душе и предпочтениях.'
category: 'Психология'

questions:
- id: q_phobias_part_1_2
  type: choice
  difficulty: 4
  text: Как называется страх **высоты**?
  options:
  - аэрофобия
  - акрофобия
  - агорафобия
  - алгофобия
  - аматофобия
  - астрафобия
  correct_answer: 1
  explanation: '**акрофобия** — это термин, обозначающий иррациональный, интенсивный страх перед определенным объектом, ситуацией или явлением. Фобии могут значительно влиять на качество жизни, но поддаются лечению с помощью психотерапии и других методов.'
