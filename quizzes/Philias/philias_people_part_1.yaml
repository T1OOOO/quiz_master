id: 'philias_people_part_1'
title: 'Отношение к людям (ч. 1)'
description: 'Интересные факты о человеческой душе и предпочтениях.'
category: 'Филии'

questions:
  - id: q_philias_100_24
    type: choice
    difficulty: 5
    text: Любовь к иностранцам или всему иностранному — это
    options:
      - Ксенофилия
      - Экзофилия
      - Туристофилия
      - Аллофилия
      - Этнофилия
      - Глобалофилия
    correct_answer: 0
    explanation: '**Ксенофилия** — от греческого "xenos" (чужой, гость). Ксенофилы открыты к новым культурам, людям и обычаям. Это противоположность ксенофобии.'
  - id: q_philias_100_25
    type: choice
    difficulty: 3
    text: Любовь к мужчинам называется
    options:
      - Андрофилия
      - Гинекофилия
      - Вирофилия
      - Антропофилия
      - Гомофилия
      - Маскулофилия
    correct_answer: 0
    explanation: '**Андрофилия** — от греческого "andros" (мужчина). Термин обозначает сексуальное или романтическое влечение к взрослым мужчинам.'
  - id: q_philias_100_26
    type: choice
    difficulty: 3
    text: Любовь к женщинам называется
    options:
      - Андрофилия
      - Гинекофилия
      - Феминофилия
      - Галлофилия
      - Партнофилия
      - Евафилия
    correct_answer: 1
    explanation: '**Гинекофилия** — от греческого "gyne" (женщина). Это влечение к взрослым женщинам.'
  - id: q_philias_100_28
    type: choice
    difficulty: 6
    text: Влечение к пожилым людям — это
    options:
      - Педофилия
      - Геронтофилия
      - Пресбиофилия
      - Сенилофилия
      - Грандофилия
      - Археофилия
    correct_answer: 1
    explanation: '**Геронтофилия** — от греческого "geron" (старец). Сексуальное предпочтение партнеров пожилого возраста.'
  - id: q_philias_100_29
    type: choice
    difficulty: 8
    text: Любовь к толпе — это
    options:
      - Демофилия
      - Охлофилия
      - Социофилия
      - Популофилия
      - Агирофилия
      - Полифилия
    correct_answer: 1
    explanation: '**Охлофилия** — от греческого "ochlos" (толпа). Охлофилы любят находиться в гуще толпы, растворяться в массе людей.'
  - id: q_philias_100_30
    type: choice
    difficulty: 7
    text: Любовь к людям (народу) вообще — это
    options:
      - Охлофилия
      - Демофилия
      - Антропофилия
      - Социофилия
      - Гуманизм
      - Этнофилия
    correct_answer: 1
    explanation: '**Демофилия** — от греческого "demos" (народ). Демофилы любят общаться с людьми, быть среди народа.'
  - id: q_philias_100_31
    type: choice
    difficulty: 4
    text: Любовь к одиночеству или самому себе — это
    options:
      - Нарциссизм
      - Автофилия
      - Изолофилия
      - Монофилия
      - Солитофилия
      - Эгофилия
    correct_answer: 1
    explanation: '**Автофилия** — от греческого "autos" (сам). Автофилы ценят уединение.'
  - id: q_philias_100_72
    type: choice
    difficulty: 8
    text: Любовь к клоунам называется
    options:
      - Гелиофилия
      - Коулрофилия
      - Сценофилия
      - Иконофилия
      - Маскофилия
      - Лудифилия
    correct_answer: 1
    explanation: '**Коулрофилия** — от греческого "kolobos" (ходулочник). Коулрофилы испытывают влечение к клоунам.'
  - id: q_philias_100_82
    type: choice
    difficulty: 7
    text: Влечение к врачам — это
    options:
      - Медикофилия
      - Ятрофилия
      - Докторофилия
      - Клиникофилия
      - Санитарофилия
      - Фармакофилия
    correct_answer: 1
    explanation: '**Ятрофилия** — от греческого "iatros" (врач). Влечение к врачам или, в более широком смысле, любовь к медицине.'
  - id: q_philias_200_18
    type: choice
    difficulty: 5
    text: Как называется любовь к людям (человечеству)?
    options:
      - Андрофилия
      - Антропофилия
      - Гуманизм
      - Социофилия
      - Демофилия
      - Этнофилия
    correct_answer: 1
    explanation: '**Антропофилия** — от греческого "anthropos" (человек). В биологии так называют организмы, предпочитающие человека (например, комары). В социологии — любовь к людям.'
  - id: q_philias_200_23
    type: choice
    difficulty: 9
    text: Влечение к девственницам называется
    options:
      - Виргофилия
      - Партенофилия
      - Неофилия
      - Пуэрофилия
      - Ювенилофилия
      - Альбофилия
    correct_answer: 1
    explanation: '**Партенофилия** — от греческого "parthenos" (дева). Сексуальное влечение к девственницам.'
  - id: q_philias_300_85
    type: choice
    difficulty: 9
    text: 'Влечение к преступникам, совершившим тяжкие преступления:'
    options:
      - Скелерофилия
      - Гибристофилия
      - Демонофилия
      - Атефилия
      - Мастигофилия
      - Пойнефилия
    correct_answer: 1
    explanation: '**Гибристофилия** — от греческого "hybrizein" (совершить насилие). Также известен как синдром Бонни и Клайда.'
  - id: q_philias_100_37
    type: choice
    difficulty: 6
    text: Влечение к трупам — это
    options:
      - Танатофилия
      - Некрофилия
      - Мортофилия
      - Кадаверофилия
      - Сапрофилия
      - Зомбифилия
    correct_answer: 1
    explanation: '**Некрофилия** — болезненное влечение к трупам. Является серьезным психическим расстройством.'
  - id: q_philias_300_82
    type: choice
    difficulty: 6
    text: 'Возбуждение от наблюдения за другими людьми без их ведома:'
    options:
      - Эксгибиционизм
      - Вуайеризм
      - Тронеризм
      - Фроттеризм
      - Кандаулизм
      - Садизм
    correct_answer: 1
    explanation: '**Вуайеризм** — от французского "voir" (видеть). Получение сексуального удовлетворения от подглядывания.'