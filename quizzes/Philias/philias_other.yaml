id: 'philias_other'
title: 'Необычные филиал'
description: 'Интересные факты о человеческой душе и предпочтениях.'
category: 'Филии'

questions:
  - id: q_philias_200_4
    type: choice
    difficulty: 4
    text: Любовь к книгам — это
    options:
      - Либрофилия
      - Библиофилия
      - Лексикофилия
      - Папирофилия
      - Скриптофилия
      - Литературофилия
    correct_answer: 1
    explanation: '**Библиофилия** — от греческого "biblion" (книга). Страстная любовь к книгам, их собирательству и чтению.'
  - id: q_philias_200_19
    type: choice
    difficulty: 10
    text: Что такое гинотиколобомассофилия?
    options:
      - Влечение к большим ушам
      - Влечение к покусыванию женских ушей
      - Влечение к массажу ушей
      - Влечение к пирсингу ушей
      - Влечение к шепоту на ухо
      - Влечение к мочкам ушей
    correct_answer: 1
    explanation: '**Гинотиколобомассофилия** — длинный и сложный термин, обозначающий специфическое влечение к покусыванию мочек женских ушей.'
  - id: q_philias_200_24
    type: choice
    difficulty: 8
    text: Влечение к запахам тела — это
    options:
      - Осмофилия
      - Бромидрофилия
      - Ольфактофилия
      - Ароматофилия
      - Потофилия
      - Феромонофилия
    correct_answer: 1
    explanation: '**Бромидрофилия** — от греческого "bromos" (зловоние) и "hidros" (пот). Влечение к запаху человеческого тела и пота.'
  - id: q_philias_200_30
    type: choice
    difficulty: 2
    text: Как называют фанатичную любовь к группе The Beatles?
    options:
      - Битлофилия
      - Битломания
      - Маккартнифилия
      - Ливерпульофилия
      - Рокфилия
      - Попфилия
    correct_answer: 1
    explanation: '**Битломания** — термин, возникший в 1960-х годах для описания интенсивного фанатизма вокруг группы The Beatles.'
  - id: q_philias_200_33
    type: choice
    difficulty: 6
    text: Любовь к удовольствиям — это
    options:
      - Гедофилия
      - Гедонизм
      - Эпикуреизм
      - Волуптофилия
      - Оргазмофилия
      - Сенсофилия
    correct_answer: 1
    explanation: '**Гедонизм** (или гедофилия в контексте влечения) — этическое учение или образ жизни, утверждающие наслаждение как высшее благо.'
  - id: q_philias_300_3
    type: choice
    difficulty: 5
    text: Любовь к Китаю и китайской культуре — это
    options:
      - Чайнафилия
      - Синофилия
      - Ориентофилия
      - Азиатофилия
      - Мандаринфилия
      - Пекинофилия
    correct_answer: 1
    explanation: '**Синофилия** — от латинского "Sinae" (Китай). Интерес к Китаю, его истории, языку и культуре.'
  - id: q_philias_300_4
    type: choice
    difficulty: 4
    text: Любовь к России и русской культуре — это
    options:
      - Славянофилия
      - Русофилия
      - Советофилия
      - Кремлефилия
      - Петрофилия
      - Ортодоксофилия
    correct_answer: 1
    explanation: '**Русофилия** — любовь к России, русскому народу, языку и культуре.'
  - id: q_philias_300_10
    type: choice
    difficulty: 7
    text: 'Влечение к демонам или злым духам:'
    options:
      - Сатанофилия
      - Демонофилия
      - Спектрофилия
      - Оккультофилия
      - Люциферофилия
      - Адофилия
    correct_answer: 1
    explanation: '**Демонофилия** — интерес или влечение к демонам, часто связанное с оккультизмом. Сексуальная форма — демономания.'
  - id: q_philias_300_43
    type: choice
    difficulty: 8
    text: 'Любовь к свободе:'
    options:
      - Либертофилия
      - Элевтерофилия
      - Анафилия
      - Автономофилия
      - Индепендофилия
      - Фридомфилия
    correct_answer: 1
    explanation: '**Элевтерофилия** — от греческого "eleutheria" (свобода). Сильное стремление к свободе и независимости.'
  - id: q_philias_300_55
    type: choice
    difficulty: 8
    text: 'Любовь к фиолетовому цвету:'
    options:
      - Виолофилия
      - Порфирофилия
      - Пурпурофилия
      - Аметистофилия
      - Лилакфилия
      - Индигофилия
    correct_answer: 1
    explanation: '**Порфирофилия** — от греческого "porphyra" (пурпур). Любовь к фиолетовому или пурпурному цвету, символу власти.'
  - id: q_philias_300_69
    type: choice
    difficulty: 7
    text: 'Влечение к татуировкам или пирсингу:'
    options:
      - Татуфилия
      - Стигматофилия
      - Иконофилия
      - Дерматофилия
      - Пиктофилия
      - Бодимодифилия
    correct_answer: 1
    explanation: '**Стигматофилия** — от греческого "stigma" (знак, клеймо). Сексуальное влечение к людям с татуировками, пирсингом или шрамами.'
  - id: q_philias_300_70
    type: choice
    difficulty: 8
    text: 'Влечение к могилам или кладбищам:'
    options:
      - Некрофилия
      - Тафофилия
      - Цементериофилия
      - Мортофилия
      - Тумулофилия
      - Сепулькрофилия
    correct_answer: 1
    explanation: '**Тафофилия** — от греческого "taphos" (могила). Интерес к кладбищам, надгробиям и погребальным ритуалам.'
  - id: q_philias_300_71
    type: choice
    difficulty: 8
    text: 'Влечение к беременности или родам:'
    options:
      - Гравидофилия
      - Токофилия
      - Матернофилия
      - Педофилия
      - Натофилия
      - Партурофилия
    correct_answer: 1
    explanation: '**Токофилия** (или маиевзиофилия) — влечение к беременным женщинам или процессу родов.'
  - id: q_philias_300_81
    type: choice
    difficulty: 5
    text: 'Любовь к сексу и эротике:'
    options:
      - Сексофилия
      - Эротофилия
      - Либидофилия
      - Коитофилия
      - Венусфилия
      - Афродитофилия
    correct_answer: 1
    explanation: '**Эротофилия** — склонность положительно реагировать на сексуальные стимулы и темы. Противоположность эротофобии.'
  - id: q_philias_300_83
    type: choice
    difficulty: 4
    text: 'Склонность демонстрировать свое тело (или половые органы) другим:'
    options:
      - Вуайеризм
      - Эксгибиционизм
      - Нарциссизм
      - Автофилия
      - Скопофилия
      - Шоуфилия
    correct_answer: 1
    explanation: '**Эксгибиционизм** — получение удовлетворения от демонстрации обнаженного тела или половых органов посторонним людям.'
  - id: q_philias_300_84
    type: choice
    difficulty: 6
    text: 'Влечение к трению о незнакомых людей в толпе:'
    options:
      - Фроттеризм
      - Тачеризм
      - Охлофилия
      - Демофилия
      - Прессофилия
      - Раббинг
    correct_answer: 1
    explanation: '**Фроттеризм** (или фроттаж) — сексуальное отклонение, при котором возбуждение достигается путем трения о людей в общественном транспорте или толпе.'