id: 'philias_lifestyle_part_2'
title: 'Филии: Образ жизни (ч. 2)'
description: 'Интересные факты о человеческой душе и предпочтениях.'
category: 'Филии'

questions:
  - id: q_philias_100_21
    type: choice
    difficulty: 5
    text: Любовь к путешествиям называется
    options:
      - Туристофилия
      - Годофилия
      - Дромофилия
      - Виафилия
      - Итинерарофилия
      - Ксенофилия
    correct_answer: 1
    explanation: '**Годофилия** — от греческого "hodos" (путь, дорога). Также используется термин дромофилия. Годофилы не могут усидеть на месте, их манит дорога и новые впечатления.'
  - id: q_philias_100_71
    type: choice
    difficulty: 4
    text: Возбуждение от наблюдения за спящим или бессознательным человеком — это
    options:
      - Вуайеризм
      - Сомнофилия
      - Дормафилия
      - Гипнофилия
      - Наркофилия
      - Тронеризм
    correct_answer: 1
    explanation: '**Сомнофилия** — от латинского "somnus" (сон). Это разновидность вуайеризма, связанная со сном (спящей красавицей).'
  - id: q_philias_100_78
    type: choice
    difficulty: 8
    text: Специфическое влечение к воздушным шарам — это
    options:
      - Аэрофилия
      - Баллонофилия
      - Метеорофилия
      - Сферофилия
      - Инфлатофилия
      - Пневмофилия
    correct_answer: 1
    explanation: '**Баллонофилия** — редкая филия, при которой человек испытывает влечение к воздушным шарам (надувным).'
  - id: q_philias_100_79
    type: choice
    difficulty: 3
    text: Влечение к роботам — это
    options:
      - Технофилия
      - Робофилия
      - Механофилия
      - Автоматонофилия
      - Киберфилия
      - Андроидфилия
    correct_answer: 1
    explanation: '**Робофилия** — влечение или сильная привязанность к роботам, андроидам или гиноидам.'
  - id: q_philias_100_84
    type: choice
    difficulty: 9
    text: Страсть к тому, чтобы быть грязным, — это
    options:
      - Мизофилия
      - Аутомизофилия
      - Молисмофилия
      - Копрофилия
      - Кониофилия
      - Рупофилия
    correct_answer: 1
    explanation: '**Аутомизофилия** — от греческого "mysos" (нечистота). Это состояние, при котором мысли о собственной загрязненности или неопрятности вызывают возбуждение.'
  - id: q_philias_100_92
    type: choice
    difficulty: 8
    text: Любовь к перекресткам и улицам — это
    options:
      - Годофилия
      - Агирофилия
      - Дромофилия
      - Урбанофилия
      - Таксофилия
      - Ходофилия
    correct_answer: 1
    explanation: '**Агирофилия** — от греческого "agyia" (улица). Это особая любовь к улицам, дорогам и городской суете.'
  - id: q_philias_100_95
    type: choice
    difficulty: 6
    text: Влечение к определенным тканям или материалам — это
    options:
      - Вестифилия
      - Текстофилия
      - Линофилия
      - Фетишизм
      - Хаптофилия
      - Интегументофилия
    correct_answer: 1
    explanation: '**Текстофилия** — любовь к определенным текстурам ткани, например, к шелку или бархату.'
  - id: q_philias_100_97
    type: choice
    difficulty: 4
    text: Любовь к Британии и всему английскому — это
    options:
      - Еврофилия
      - Англофилия
      - Британофилия
      - Лондонофилия
      - Франкофилия
      - Ксенофилия
    correct_answer: 1
    explanation: '**Англофилия** — восхищение английской культурой, языком, историей и традициями.'
  - id: q_philias_100_98
    type: choice
    difficulty: 4
    text: Любовь к Франции и всему французскому — это
    options:
      - Англофилия
      - Галлофилия
      - Паризофилия
      - Еврофилия
      - Галломания
      - Ксенофилия
    correct_answer: 1
    explanation: '**Галлофилия** (или франкофилия) — любовь к Франции, французскому языку и культуре.'
  - id: q_philias_100_99
    type: choice
    difficulty: 4
    text: Любовь к Японии и японской культуре — это
    options:
      - Ориентофилия
      - Японофилия
      - Ниппонофилия
      - Азиатофилия
      - Ксенофилия
      - Анимефилия
    correct_answer: 1
    explanation: '**Японофилия** — интерес и любовь к Японии, ее истории и культуре (включая современную).'
  - id: q_philias_200_25
    type: choice
    difficulty: 8
    text: Как называется страсть к коллекционированию наклеек (декалей)?
    options:
      - Коллекциофилия
      - Декалькофилия
      - Пиктофилия
      - Библиофилия
      - Глиптофилия
      - Иконофилия
    correct_answer: 1
    explanation: '**Декалькофилия** — коллекционирование переводимых картинок (декалькомания).'
  - id: q_philias_200_50
    type: choice
    difficulty: 6
    text: Любовь к принятию ванны или мытью — это
    options:
      - Гидрофилия
      - Аблютофилия
      - Бальнеофилия
      - Аквафилия
      - Чистофилия
      - Гигиенофилия
    correct_answer: 1
    explanation: '**Аблютофилия** — от латинского "ablutio" (омовение). Аблютофилы любят мыться, принимать ванну или душ.'
  - id: q_philias_200_52
    type: choice
    difficulty: 6
    text: Любовь к тому, чтобы находиться в постели, — это
    options:
      - Сомнофилия
      - Клинофилия
      - Дормафилия
      - Гипнофилия
      - Квиетофилия
      - Стазефилия
    correct_answer: 1
    explanation: '**Клинофилия** — от греческого "kline" (кровать). Клинофилы любят лежать в кровати, даже если не спят.'
  - id: q_philias_200_53
    type: choice
    difficulty: 6
    text: Страсть к часам и приборам для измерения времени называется
    options:
      - Хронофилия
      - Хронометрофилия
      - Горологофилия
      - Темпорофилия
      - Механофилия
      - Технофилия
    correct_answer: 1
    explanation: '**Хронометрофилия** — интерес к часам и хронометрам.'
  - id: q_philias_200_54
    type: choice
    difficulty: 6
    text: Как называется любовь к старой одежде или антикварным вещам?
    options:
      - Ретрофилия
      - Палеофилия
      - Вестифилия
      - Археофилия
      - Ностофилия
      - Геронтофилия
    correct_answer: 1
    explanation: '**Палеофилия** — любовь к древности и старинным вещам.'
  - id: q_philias_200_89
    type: choice
    difficulty: 8
    text: Как называется страсть к автомобим или езде в них?
    options:
      - Механофилия
      - Амаксофилия
      - Охофилия
      - Технофилия
      - Дромофилия
      - Тахофилия
    correct_answer: 1
    explanation: '**Амаксофилия** — от греческого "amaxa" (повозка). Любовь к нахождению в транспортном средстве.'
  - id: q_philias_300_32
    type: choice
    difficulty: 4
    text: 'Увлечение компьютерами и работой на них:'
    options:
      - Технофилия
      - Киберфилия
      - Электрофилия
      - Механофилия
      - Блогофилия
      - Диджитофилия
    correct_answer: 1
    explanation: '**Киберфилия** — увлечение киберпространством и компьютерами.'
  - id: q_philias_300_33
    type: choice
    difficulty: 5
    text: Страсть к велосипедам называется
    options:
      - Механофилия
      - Циклофилия
      - Дромофилия
      - Тахофилия
      - Велофилия
      - Ротофилия
    correct_answer: 1
    explanation: '**Циклофилия** — любовь к велосипедам.'
  - id: q_philias_300_36
    type: choice
    difficulty: 5
    text: 'Любовь к полетам или авиации:'
    options:
      - Акрофилия
      - Авиатофилия
      - Аэрофилия
      - Птерофилия
      - Астрофилия
      - Нефофилия
    correct_answer: 1
    explanation: '**Авиатофилия** — любовь к полетам на самолетах.'
  - id: q_philias_300_37
    type: choice
    difficulty: 3
    text: Страсть к ведению блогов — это
    options:
      - Киберфилия
      - Блогофилия
      - Скриптофилия
      - Логофилия
      - Графофилия
      - Технофилия
    correct_answer: 1
    explanation: '**Блогофилия** — любовь к ведению интернет-дневников.'
  - id: q_philias_300_39
    type: choice
    difficulty: 9
    text: 'Любовь к мостам и их переходу:'
    options:
      - Годофилия
      - Гефирофилия
      - Понтофилия
      - Дромофилия
      - Акрофилия
      - Топофилия
    correct_answer: 1
    explanation: '**Гефирофилия** — от греческого "gephyra" (мост). Любовь к мостам.'