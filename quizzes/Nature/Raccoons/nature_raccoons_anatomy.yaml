  correct_multi: null
- id: q_nature_raccoons_anatomy_015
  type: choice
  text: Может ли енот поворачивать голову так же сильно, как сова?
  options:
  - Да, на 270 градусов
  - Нет, подвижность шеи средняя
  - Только на 180 градусов
  - Голова у него вообще не крутится
  - У него нет шеи
  - На 360 градусов
