id: 'nature_raccoons_anatomy'
title: 'Еноты: Анатомия и способности'
description: 'Насколько хорошо вы знаете, как устроен этот 'бандит' в маске?'
category: 'Природа'

questions:
- id: q_nature_raccoons_anatomy_001
  type: choice
  text: Как называется характерная черта енота — темные пятна вокруг глаз?
  options:
  - Очки
  - Маска
  - Фары
  - Тени
  - Камуфляж
  - Забрало
  correct_answer: 1
  explanation: Темная 'маска' не только придает еноту вид бандита, но и помогает уменьшить блики и лучше видеть в темноте.
  correct_multi: null
- id: q_nature_raccoons_anatomy_002
  type: choice
  text: Сколько пальцев на передней лапе у енота?
  options:
  - '3'
  - '4'
  - '5'
  - '6'
  - '8'
  - '2'
  correct_answer: 2
  explanation: У енотов по пять пальцев на каждой лапе, что делает их передние конечности крайне похожими на человеческие руки.
  correct_multi: null
- id: q_nature_raccoons_anatomy_003
  type: choice
  text: Какую уникальную способность имеют задние лапы енота, позволяющую ему спускаться с дерева головой вниз?
  options:
  - Они могут удлиняться
  - Они поворачиваются на 180 градусов
  - У них есть присоски
  - Они полностью убираются
  - Они покрыты липким мехом
  - Они не имеют костей
  correct_answer: 1
  explanation: Еноты могут разворачивать свои задние стопы на 180 градусов, что дает им исключительную устойчивость при спуске вниз головой.
  correct_multi: null
- id: q_nature_raccoons_anatomy_004
  type: choice
  text: Сколько обычно колец на хвосте у енота-полоскуна?
  options:
  - 1-2
  - 5-10
  - 20-30
  - Ни одного
  - Всегда ровно 4
  - Хвост полосатый вдоль, а не поперек
  correct_answer: 1
  explanation: На пушистом хвосте енота обычно насчитывается от 4 до 10 черных колец.
  correct_multi: null
- id: q_nature_raccoons_anatomy_005
  type: choice
  text: Какое из чувств у енота развито лучше всего?
  options:
  - Зрение
  - Обоняние
  - Слух
  - Осязание
  - Вкус
  - Эхолокация
  correct_answer: 3
  explanation: Чувствительность лап енота феноменальна — большая часть коры их мозга настроена на интерпретацию тактильных импульсов.
  correct_multi: null
- id: q_nature_raccoons_anatomy_006
  type: choice
  text: Что происходит с чувствительностью лап енота, когда они намокают?
  options:
  - Она пропадает
  - Она заметно увеличивается
  - Она не меняется
  - Лапы становятся скользкими
  - Еноту становится больно трогать предметы
  - Лапы начинают светиться
  correct_answer: 1
  explanation: Вода увеличивает тактильную чувствительность нервных окончаний на подушечках лап, поэтому еноты часто 'полощут' предметы.
  correct_multi: null
- id: q_nature_raccoons_anatomy_007
  type: choice
  text: Какого цвета мех у большинства енотов-полоскунов?
  options:
  - Рыжий
  - Черный
  - Белый
  - Серо-бурый
  - Зеленоватый
  - Ярко-синий
  correct_answer: 3
  explanation: Основной окрас шерсти — серовато-бурый с густым подшерстком.
  correct_multi: null
- id: q_nature_raccoons_anatomy_008
  type: choice
  text: Правда ли, что еноты являются дальтониками?
  options:
  - Да, видят всё в ч/б
  - Нет, видят все цвета
  - Видят только зеленый
  - Плохо различают цвета, но видят зеленый свет
  - Видят только в ультрафиолете
  - Они слепые
  correct_answer: 3
  explanation: Считается, что еноты плохо различают цвета, но их глаза крайне чувствительны к зеленому свету.
  correct_multi: null
- id: q_nature_raccoons_anatomy_009
  type: choice
  text: Для чего еноту нужен его пышный хвост?
  options:
  - Для плавания
  - Для баланса и хранения жира
  - Чтобы отбиваться от врагов
  - Чтобы закрывать лицо во сне
  - Чтобы привлекать партнеров
  - Чтобы чистить норы
  correct_answer: 1
  explanation: Хвост помогает еноту сохранять равновесие при лазании и служит депо для жировых запасов на зиму.
  correct_multi: null
- id: q_nature_raccoons_anatomy_010
  type: choice
  text: Каков средний вес взрослого енота-полоскуна?
  options:
  - 1-2 кг
  - 5-9 кг (может достигать 20+ к зиме)
  - 50-70 кг
  - 100 грамм
  - 15-20 кг стабильно
  - Как у средней кошки (3 кг)
  correct_answer: 1
  explanation: Обычно еноты весят около 5-9 кг, но к зиме могут сильно отъедаться и весить более 20 кг.
  correct_multi: null
- id: q_nature_raccoons_anatomy_011
  type: choice
  text: Как называется подсемейство, к которому принадлежат еноты?
  options:
  - Собачьи
  - Медвежьи
  - Енотовые (Procyoninae)
  - Кошачьи
  - Куньи
  - Виверровые
  correct_answer: 2
  explanation: Еноты входят в семейство енотовых (Procyonidae), подсемейство Procyoninae.
  correct_multi: null
- id: q_nature_raccoons_anatomy_012
  type: choice
  text: Есть ли у енота втягивающиеся когти?
  options:
  - Да, как у кошки
  - Нет, когти не втягиваются
  - Только на задних лапах
  - Только на передних лапах
  - Когтей у них нет
  - Они втягиваются только во сне
  correct_answer: 1
  explanation: Когти енотов не втягиваются, что помогает им при рытье и лазании.
  correct_multi: null
- id: q_nature_raccoons_anatomy_013
  type: choice
  text: Какая особенность слуха есть у енотов?
  options:
  - Они глухие
  - Слышат очень высокие частоты (ультразвук)
  - Слышат только топот
  - Слышат, как черви ползают под землей
  - Слышат мысли людей
  - Слух у них слабее человеческого
  correct_answer: 3
  explanation: У енотов очень острый слух, способный улавливать даже тихие звуки насекомых и червей под землей.
  correct_multi: null
- id: q_nature_raccoons_anatomy_014
  type: choice
  text: Какое расположение зубов характерно для енота как для всеядного животного?
  options:
  - Только клыки
  - Только коренные зубы
  - 40 зубов, включая острые клыки и плоские коренные
  - Зубов нет, есть роговой клюв
  - 2 больших резца, как у грызуна
