id: 'nature_raccoons_behavior'
title: 'Еноты: Поведение и привычки'
description: 'Почему они полощут еду и насколько они умны?'
category: 'Природа'

questions:
- id: q_nature_raccoons_behavior_001
  type: choice
  text: Как называется знаменитая привычка енотов опускать еду в воду?
  options:
  - Купание
  - Полоскание (washing)
  - Охлаждение
  - Дизинфекция
  - Маринование
  - Утопление
  correct_answer: 1
  explanation: Это поведение дало название виду 'полоскун'. На самом деле еноты так лучше осязают пищу, а не моют её.
  correct_multi: null
- id: q_nature_raccoons_behavior_002
  type: choice
  text: В какое время суток еноты наиболее активны?
  options:
  - В полдень
  - Ночью и в сумерки
  - Только утром
  - Они активны 24 часа в сутки
  - Только зимой
  - В солнечную погоду
  correct_answer: 1
  explanation: Еноты — преимущественно ночные животные, хотя кормящие самки могут выходить и днем.
  correct_multi: null
- id: q_nature_raccoons_behavior_003
  type: choice
  text: Как долго еноты могут помнить решение сложной задачи (например, как открыть замок)?
  options:
  - 5 минут
  - 1 день
  - До 3 лет
  - До конца жизни
  - 1 час
  - Они всё забывают через секунду
  correct_answer: 2
  explanation: Эксперименты показали, что еноты способны помнить усвоенные навыки решения задач как минимум три года.
  correct_multi: null
- id: q_nature_raccoons_behavior_004
  type: choice
  text: Являются ли еноты социальными животными?
  options:
  - Нет, они всегда одиночки
  - Да, живут огромными стаями
  - Чаще одиночки, но могут образовывать небольшие группы одного пола
  - Живут только парами на всю жизнь
  - Только в детстве
  - Живут вместе только зимой
  correct_answer: 2
  explanation: Они не являются стайными, но неродственные самцы могут объединяться в группы (до 4 особей), а самки делить общую территорию.
  correct_multi: null
- id: q_nature_raccoons_behavior_005
  type: choice
  text: Как еноты готовятся к зиме в холодных регионах?
  options:
  - Улетают на юг
  - Впадают в глубокую спячку
  - Впадают в состояние торпора (длительного сна)
  - Начинают охотиться днем
  - Строят иглу из снега
  - Больше пьют воды
  correct_answer: 2
  explanation: Еноты не впадают в истинную спячку, но могут спать неделями в морозы, снижая метаболизм.
  correct_multi: null
- id: q_nature_raccoons_behavior_006
  type: choice
  text: Сколько различных звуков могут издавать еноты для общения?
  options:
  - Один (писк)
  - Около 5
  - Более 50
  - Только рычание
  - Они немые
  - '10'
  correct_answer: 2
  explanation: 'Вокальный репертуар енотов очень широк: свист, шипение, урчание, крики, ворчание и многие другие.'
  correct_multi: null
- id: q_nature_raccoons_behavior_007
  type: choice
  text: Что еноты обычно делают, встретив незнакомого человека в городе?
  options:
  - Сразу нападают
  - Игнорируют и продолжают есть
  - Замирают или убегают, если чувствуют угрозу
  - Начинают танцевать
  - Просят автограф
  - Прыгают на плечи
  correct_answer: 2
  explanation: Обычно еноты стараются избегать конфликтов с людьми, если их не загонять в угол.
  correct_multi: null
- id: q_nature_raccoons_behavior_008
  type: choice
  text: Зачем мамы-енотихи вылизывают своих детенышей?
  options:
  - Только для чистоты
  - Чтобы стимулировать пищеварение и мочеиспускание
  - Чтобы они были вкуснее
  - Чтобы охладить их
  - Чтобы пометить как своих
  - Чтобы они не пищали
  correct_answer: 1
  explanation: Как и многим млекопитающим, малышам нужна стимуляция для нормальной работы выделительной системы.
  correct_multi: null
- id: q_nature_raccoons_behavior_009
  type: choice
  text: Какое поведение енота в городе вызывает больше всего проблем у людей?
  options:
  - Пение под окнами
  - Переворачивание мусорных баков в поисках еды
  - Кража белья с веревок
  - Покусывание шин
  - Они не создают проблем
  - Строительство плотин
  correct_answer: 1
  explanation: Их привычка искать еду в мусоре и способность открывать крышки баков — классическая черта городских енотов.
  correct_multi: null
- id: q_nature_raccoons_behavior_010
  type: choice
  text: Правда ли, что еноты — отличные пловцы?
  options:
  - Да, хотя их мех не водонепроницаем
  - Совершенно не умеют плавать
  - Плавают только в ванне
  - Плавают быстрее дельфинов
  - Только маленькие еноты умеют плавать
  - Они ходят по дну
  correct_answer: 0
  explanation: Еноты — сильные пловцы, но делают это по необходимости, так как их мех быстро намокает и утяжеляет их.
  correct_multi: null
- id: q_nature_raccoons_behavior_011
  type: choice
  text: Что енот-мать делает с детенышами, если чувствует угрозу логову?
  options:
  - Бросает их
  - Нападает в ответ
  - Переносит их по одному в новое место
  - Закапывает их в землю
  - Спит дальше
  - Зовет отца на помощь
  correct_answer: 2
  explanation: Самки енотов очень преданы потомству и при опасности перемещают выводок в запасное убежище.
  correct_multi: null
- id: q_nature_raccoons_behavior_012
  type: choice
  text: Как еноты находят еду в мутных водоемах?
  options:
  - С помощью эхолокации
  - С помощью зрения
  - Ощупывая дно чувствительными передними лапами
  - Ждут, когда еда сама всплывет
  - Используют длинную палку
  - Ныряют на 100 метров
  correct_answer: 2
  explanation: Их лапы настолько чувствительны, что они буквально 'видят' руками предметы под водой.
  correct_multi: null
- id: q_nature_raccoons_behavior_013
  type: choice
  text: Для чего еноты иногда объединяются в группы самцов?
  options:
  - Для воспитания детей
  - Для защиты территории от других самцов
  - Чтобы играть в карты
  - Для совместной охоты на медведей
  - Им скучно поодиночке
  - Групп самцов не существует
  correct_answer: 1
  explanation: Небольшие коалиции самцов помогают им удерживать территорию против конкурентов.
  correct_multi: null
- id: q_nature_raccoons_behavior_014
  type: choice
  text: Как енот выражает агрессию или предупреждает о нападении?
  options:
  - Машет хвостом
  - Издает громкое шипение, ворчание и выгибает спину
  - Притворяется мертвым
  - Начинает смеяться
  - Кидается едой
  - Хлопает в ладоши
  correct_answer: 1
  explanation: Типичные сигналы угрозы — шипение, рычание и попытка казаться больше за счет выгнутой спины и поднятого меха.
  correct_multi: null
- id: q_nature_raccoons_behavior_015
  type: choice
  text: В каком возрасте еноты обычно становятся полностью самостоятельными?
  options:
  - В 1 месяц
  - В 2-3 месяца
  - В 10-12 месяцев (после первой зимы)
  - Через неделю после рождения
  - В 5 лет
  - Никогда, живут с мамой всю жизнь
  correct_answer: 2
  explanation: Молодняк обычно остается с матерью до осени или даже до конца первой зимы.
