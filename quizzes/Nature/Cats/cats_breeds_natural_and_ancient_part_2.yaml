- id: q_nature_cats_breeds_cat_124
  type: choice
  text: Какая порода кошек известна своей «улыбкой» из-за специфической формы головы и мордочки?
  options:
  - Сиамская
  - Русская голубая
  - Шартрез (Chartreux)
  - Персидская
  - Мейн-кун
  correct_answer: 2
  explanation: У кошек породы Шартрез (картезианская кошка) форма черепа сужается к морде так, что кажется, будто кот постоянно улыбается.
  correct_multi: null
  difficulty: 5
