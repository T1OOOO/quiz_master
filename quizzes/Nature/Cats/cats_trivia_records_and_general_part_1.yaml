  options:
  - Она хочет спать
  - Это «кошачий поцелуй», знак доверия
  - Она замышляет атаку
  - У нее болят глаза
  - Она вас не видит
  correct_answer: 1
  explanation: Медленное моргание в мире кошек означает поцелуй и полное доверие.
  correct_multi: null
  difficulty: 7
- id: q_nature_cats_behavior_cat_238
  type: choice
  text: Что означает медленное моргание кошки, направленное на хозяина?
  options:
  - Она хочет спать
  - Это «кошачий поцелуй», знак доверия
  - Она замышляет атаку
  - У нее болят глаза
  - Она просит еду
  correct_answer: 1
  explanation: Медленное моргание («kitty kiss») свидетельствует о спокойствии, довольстве и полном доверии.
