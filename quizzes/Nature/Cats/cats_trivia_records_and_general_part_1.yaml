  - 20-22 часа
  - 2 часа
  - Вообще не спит
  correct_answer: 1
  explanation: Обычно кошки спят от 12 до 16 часов в день, проводя во сне большую часть жизни.
  correct_multi: null
  difficulty: 7
- id: q_nature_cats_behavior_cat_076
  type: choice
  text: Какой процент своей жизни кошки проводят во сне?
  options:
  - Около 30%
  - Около 50%
  - Около 70%
  - Около 90%
  - Кошки спят только ночью
  correct_answer: 2
