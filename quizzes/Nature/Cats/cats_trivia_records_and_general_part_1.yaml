  - Они не пьют воду вообще
  - Вода слишком холодная
  - Они предпочитают молоко
  correct_answer: 1
  explanation: Многие кошки предпочитают проточную воду и инстинктивно избегают воды рядом с едой.
  correct_multi: null
  difficulty: 4
- id: q_nature_cats_behavior_cat_046
