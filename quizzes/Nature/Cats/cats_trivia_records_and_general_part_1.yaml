  difficulty: 5
- id: q_nature_cats_behavior_cat_184
  type: choice
  text: Почему кошки едят траву?
  options:
  - Им не хватает витаминов
  - Чтобы легче отрыгивать проглоченную при чистке шерсть
  - Им нравится вкус
  - Для заточки зубов
  - Они всеядны
  correct_answer: 1
  explanation: Поедание травы помогает кошкам очищать желудок от комочков шерсти.
  correct_multi: null
  difficulty: 5
- id: q_nature_cats_behavior_cat_253
  type: choice
  text: Какой процент времени кошки проводят за умыванием и чисткой шерсти?
  options:
  - 10%
  - До 30% — 50% времени бодрствования
  - 90%
  - Вообще не умываются
  - 5%
  correct_answer: 1
  explanation: Кошки — очень чистоплотные животные и тратят на груминг до трети времени, когда не спят.
  correct_multi: null
  difficulty: 5
- id: q_nature_cats_behavior_cat_257
  type: choice
  text: Для чего кошки едят траву?
  options:
  - Для вкуса
  - Для очистки желудка от комочков шерсти (регургитации)
