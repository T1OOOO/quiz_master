id: 'cats_trivia_records_and_general_part_1'
title: 'Факты о кошках (ч. 1)'
description: 'Проверьте свои знания о кошках в теме 'Интересные факты о кошках (часть 1)'.'
category: 'Природа'

questions:
- id: q_nature_cats_behavior_cat_252
  type: choice
  text: Что кошка обычно «говорит» своим собратьям (взрослым особям)?
  options:
  - Громко мяукает
  - Только шипит, плюется и мурлычет
  - Лает
  - Молчит всегда
  - Танцует
  correct_answer: 1
  explanation: Взрослые кошки почти никогда не мяукают друг другу, используя этот звук только для людей.
  correct_multi: null
  difficulty: 5
- id: q_nature_cats_behavior_cat_179
  type: choice
  text: В каком возрасте котята обычно становятся способными к размножению (половозрелыми)?
  options:
  - В 2 месяца
  - В 4 месяца
  - В 1 год
  - В 2 года
  - В 8 месяцев
  correct_answer: 1
  explanation: Кошки могут забеременеть уже в возрасте 4 месяцев.
  correct_multi: null
  difficulty: 4
- id: q_nature_cats_behavior_cat_173
  type: choice
  text: На сколько человеческих лет эквивалентен один год жизни кошки (согласно распространенному правилу)?
  options:
  - На 3 года
  - На 5 лет
  - На 7 лет
  - На 10 лет
  - На 2 года
  correct_answer: 2
  explanation: Традиционно считается, что один «кошачий» год равен семи «человеческим».
  correct_multi: null
  difficulty: 6
- id: q_nature_cats_behavior_cat_021
  type: choice
  text: Почему кошки часто закапывают свои экскременты?
  options:
