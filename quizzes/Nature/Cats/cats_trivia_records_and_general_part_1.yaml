  - Чтобы скрыть свой запах от врагов и показать подчинение
  - Просто играют
  - Чтобы пометить территорию
  - Потому что им нравится песок
  correct_answer: 1
  explanation: В дикой природе это способ не привлекать внимание хищников и признать лидерство вожака.
  correct_multi: null
  difficulty: 3
- id: q_nature_cats_behavior_cat_216
  type: choice
  text: Как называется боязнь или ненависть к кошкам?
  options:
  - Арахнофобия
  - Айлурофобия
  - Кинофобия
  - Гидрофобия
  - Клаустрофобия
  correct_answer: 1
  explanation: Боязнь кошек официально называется айлурофобией или алюрофобией.
  correct_multi: null
  difficulty: 5
- id: q_nature_cats_behavior_cat_008
  type: choice
  text: Сколько различных звуков могут издавать кошки для общения?
  options:
  - Около 10
  - Около 50
  - До 100
  - Более 500
  - Только 1
  correct_answer: 2
