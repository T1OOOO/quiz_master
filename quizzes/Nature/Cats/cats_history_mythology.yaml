- id: q_nature_cats_history_culture_cat_096
  type: choice
  text: Что представляет собой шотландский мифический персонаж Кат Ши (Cat Sìth)?
  options:
  - Маленький белый котенок
  - Огромный черный кот с белым пятном на груди
  - Кот с крыльями
  - Кот, живущий под водой
  - Огненный кот
  correct_answer: 1
  explanation: Считалось, что Кат Ши — это ведьма-оборотень или фейри, способный красть души умерших.
  correct_multi: null
  difficulty: 5
