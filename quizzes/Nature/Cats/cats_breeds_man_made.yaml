id: cats_breeds_man_made
title: Искусственные породы кошек
description: Проверьте свои знания о кошках в теме 'Искусственно выведенные породы
  кошек'.
category: Природа
questions:
- id: q_nature_cats_breeds_cat_016
  type: choice
  text: Какая порода кошек считается «оригинальной карликовой» из-за коротких лап?
  options:
  - Балинезийская
  - Манчкин
  - Сиамская
  - Персидская
  - Бомбейская
  correct_answer: 1
  explanation: Манчкины считаются родоначальниками пород с короткими лапами из-за
    генетической мутации.
  correct_multi: null
  difficulty: 6
- id: q_nature_cats_breeds_cat_087
  type: choice
  text: Что является отличительной генетической чертой кошек породы манчкин?
  options:
  - Отсутствие хвоста
  - Кудрявая шерсть
  - Очень короткие лапы
  - Глаза разного цвета
  - Висячие уши
  correct_answer: 2
  explanation: Манчкины — это «таксы» в мире кошек, их короткие лапы возникли в результате
    естественной мутации.
  correct_multi: null
  difficulty: 5
- id: q_nature_cats_breeds_cat_129
  type: choice
  text: Как называют породу кошек манчкин из-за их уникальной мутации коротких лап?
  options:
  - Кошки-таксы (или оригинальная карликовая порода)
  - Кошки-гномы
  - Прыгучие коты
  - Бесхвостые коты
  - Лесные коты
  correct_answer: 0
  explanation: Манчкины — родоначальники всех пород с короткими лапами, их часто сравнивают
    с собаками породы такса.
  correct_multi: null
  difficulty: 5
- id: q_nature_cats_breeds_cat_242
  type: choice
  text: Как называется порода кошек с очень короткими лапами, считающаяся аналогом
    таксы?
  options:
  - Балинезийская
  - Манчкин
  - Сиамская
  - Персидская
  - Саванна
  correct_answer: 1
  explanation: Манчкины — это порода с короткими лапами, возникшими в результате естественной
    мутации.
  correct_multi: null
  difficulty: 6
- id: q_nature_cats_breeds_cat_302
  type: choice
  text: Какую породу называют «корги в мире кошек» из-за очень коротких лап?
  options:
  - Манчкин
  - Минскин (Minskin)
  - Наполеон
  - Балинезийская
  - Сфинкс
  correct_answer: 1
  explanation: Минскин — это молодая порода, полученная в 1998 году при участии манчкинов
    и сфинксов.
  correct_multi: null
  difficulty: 5
- id: q_nature_cats_breeds_cat_086
  type: choice
  text: К какой кошке на шотландской ферме в 1961 году восходит родословная всех шотландских
    вислоухих?
  options:
  - К кошке Белле
  - К кошке Сюзи
  - К кошке Молли
  - К кошке Флосси
  - К кошке Луне
  correct_answer: 1
  explanation: Белая амбарная кошка Сюзи была первой найденной особью с мутацией складчатых
    ушей.
  correct_multi: null
  difficulty: 5
- id: q_nature_cats_breeds_cat_304
  type: choice
  text: Какая порода кошек всегда имеет только рыжий (ginger) окрас и кудрявую шерсть?
  options:
  - Селкирк-рекс
  - Теннесси Рекс (Tennessee Rex)
  - Корниш-рекс
  - Девон-рекс
  - Ла-перм
  correct_answer: 1
  explanation: Теннесси рекс — это «пушистые рыжие головы», ведущие род от бродячей
    кошки из Теннесси.
  correct_multi: null
  difficulty: 4
- id: q_nature_cats_breeds_cat_387
  type: choice
  text: Как звали маму котят, от которой произошли все кошки породы селкирк-рекс?
  options:
  - Белла
  - Сюзи
  - Мисс ДеПесто
  - Флосси
  - Маша
  correct_answer: 2
  explanation: Первая кошка этой породы (Мисс ДеПесто) родилась в 1987 году в Монтане.
  correct_multi: null
  difficulty: 4
- id: q_nature_cats_breeds_cat_114
  type: choice
  text: В какой стране в 1966 году в результате спонтанной мутации у обычной кошки
    родился первый лысый котенок, ставший предком современных сфинксов?
  options:
  - Египет
  - Канада
  - Россия
  - Мексика
  - США
  correct_answer: 1
  explanation: Порода сфинкс зародилась в Канаде, когда домашняя кошка внезапно родила
    бесшерстного котенка.
  correct_multi: null
  difficulty: 5
- id: q_nature_cats_breeds_cat_222
  type: choice
  text: В какой стране в 1966 году родился первый лысый котенок, ставший предком канадских
    сфинксов?
  options:
  - Египет
  - Канада
  - Россия
  - Мексика
  - США
  correct_answer: 1
  explanation: Порода сфинкс зародилась в Канаде в результате спонтанной генетической
    мутации.
  correct_multi: null
  difficulty: 4
- id: q_nature_cats_breeds_cat_268
  type: choice
  text: Как называется порода, выведенная от кошки-мутанта Сюзи в Шотландии?
  options:
  - Шотландская прямоухая
  - Шотландская вислоухая (Scottish Fold)
  - Британская короткошерстная
  - Персидская
  - Мэнкс
  correct_answer: 1
  explanation: Все Scottish Fold в мире ведут родословную от одной амбарной кошки
    Сюзи с загнутыми ушами.
  correct_multi: null
  difficulty: 5
- id: q_nature_cats_breeds_cat_306
  type: choice
  text: Как называется порода, созданная в 2001 году для внешнего сходства с диким
    леопардом?
  options:
  - Бенгальская
  - Чиху (Cheetoh)
  - Саванна
  - Серенгети
  - Оцелот
  correct_answer: 1
  explanation: Порода чиху была выведена Кэрол Драймон путем скрещивания бенгальских
    кошек и оцикетов.
  correct_multi: null
  difficulty: 5
- id: q_cat_new_man_1
  text: Порода кошек-оборотней?
  options:
  - Сфинкс
  - Ликой
  - Саванна
  - Рэгдолл
  correct_answer: 1
  explanation: У ликоев специфическая разреженная шерсть.
  difficulty: 7
  type: choice
- id: q_cat_new_man_2
  text: Гибрид домашней кошки и сервала?
  options:
  - Бенгал
  - Саванна
  - Хаузи
  - Тойгер
  correct_answer: 1
  explanation: Саванна — очень крупная порода.
  difficulty: 5
  type: choice
- id: q_cat_new_man_3
  text: Порода-лжелеопард без диких генов?
  options:
  - Бенгал
  - Оцикат
  - Серенгети
  - Саванна
  correct_answer: 1
  explanation: Оцикат выведен из абиссинцев и сиамцев.
  difficulty: 6
  type: choice
