  - 5 километров
  - 10 километров
  - 20 километров
  - 50 километров
  - 1 километр
  correct_answer: 2
  explanation: Сеть подвалов, называемая «большим кошачьим подвалом», растянулась почти на двадцать километров.
  correct_multi: null
  difficulty: 4
- id: q_nature_cats_anatomy_cat_077
  type: choice
  text: Какую скорость может развить кошка на короткой дистанции (спринте)?
  options:
  - 10 км/ч
  - 30 км/ч
  - Около 48–50 км/ч (30 миль/ч)
  - 100 км/ч
  - 5 км/ч
  correct_answer: 2
  explanation: На коротком рывке домашняя кошка способна обогнать даже олимпийского чемпиона Усейна Болта.
  correct_multi: null
  difficulty: 7
- id: q_nature_cats_anatomy_cat_120
  type: choice
