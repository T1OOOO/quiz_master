id: 'cats_breeds_natural_and_ancient_part_1'
title: 'Древние породы кошек (ч. 1)'
description: 'Проверьте свои знания о кошках в теме ''Древние породы кошек (часть 1)''.'
category: 'Природа'

questions:
- id: q_nature_cats_behavior_cat_310
  type: choice
  text: Какое прозвище получили кошки породы серенгети из-за их привычки всегда быть рядом с хозяином?
  options:
  - Кошки-тени
  - Кошки-липучки (Velcro cats)
  - Кошки-собаки
  - Охотники галерей
  - Прыгуны
  correct_answer: 1
  explanation: Серенгети — очень преданные и любопытные кошки, за что их прозвали «Velcro cats».
  correct_multi: null
  difficulty: 7
- id: q_nature_cats_anatomy_cat_307
  type: choice
  text: Как называется окрас кошек с темными «точками» на лапах, морде и ушах, характерный для сиамской породы?
  options:
  - Тэбби
  - Пойнтовый (Pointed)
  - Черепаховый
  - Калико
  - Смокинг
  correct_answer: 1
  explanation: Пойнтовый окрас связан с генами альбинизма, которые активируются при температуре тела выше 36,6°C.
  correct_multi: null
  difficulty: 3
- id: q_nature_cats_breeds_cat_085
