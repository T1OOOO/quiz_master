id: 'cats_biology_anatomy_part_1'
title: 'Биология и анатомия кошек (ч. 1)'
description: 'Проверьте свои знания о кошках в теме ''Биология и анатомия кошек (часть 1)''.'
category: 'Природа'

questions:
- id: q_nature_cats_behavior_cat_010
  type: choice
  text: Что означает хвост кошки в форме знака вопроса?
  options:
  - Кошка злится
  - Кошка хочет есть
  - Кошка хочет играть
  - Кошка напугана
  - Кошка спит
  correct_answer: 2
  explanation: 'Хвост в форме вопросительного знака означает вопрос: «Хочешь поиграть?».'
  correct_multi: null
  difficulty: 6
- id: q_nature_cats_behavior_cat_058
  type: choice
  text: О чем говорит хвост кошки, изогнутый в форме вопросительного знака?
  options:
  - Кошка напугана
  - Кошка хочет есть
  - 'Кошка спрашивает: ''"«Хочешь поиграть?»''"'
  - Кошка сердится
  - Кошка помечает территорию
  correct_answer: 2
  explanation: Такая форма хвоста — явный признак игривого настроения.
  correct_multi: null
  difficulty: 7
- id: q_nature_cats_behavior_cat_323
  type: choice
  text: Что означает поведение кошки, когда она яростно бьет хвостом по бокам?
  options:
  - Она очень счастлива
  - Она готовится к нападению
  - Она просит поиграть
  - Она хочет спать
  - Она замерзла
  correct_answer: 1
  explanation: Виляние хвостом у кошки — это признак сильного раздражения или подготовки к атаке.
  correct_multi: null
  difficulty: 6
- id: q_nature_cats_behavior_cat_369
  type: choice
  text: Что кошка сообщает, когда ее хвост дрожит или вибрирует?
  options:
  - Она боится
  - Она очень рада вас видеть
  - У нее болит спина
  - Она хочет спать
  - Она метит территорию
  correct_answer: 1
  explanation: Вибрирующий хвост — признак высшей степени радости и приветствия хозяина.
  correct_multi: null
  difficulty: 4
- id: q_nature_cats_anatomy_cat_295
  type: choice
  text: Какая часть кошачьего скелета позволяет им всегда приземляться на лапы?
  options:
  - Усы
  - Хвост и позвоночник (рефлекс выпрямления)
  - Плечи
  - Череп
  - Лапы
  correct_answer: 1
  explanation: Эластичный позвоночник и чувство баланса (вестибулярный аппарат) обеспечивают «рефлекс выпрямления».
  correct_multi: null
  difficulty: 4
- id: q_nature_cats_history_culture_cat_107
  type: choice
  text: Согласно японскому фольклору, какая зловещая версия кошки-оборотня (нэкомата) обладает раздвоенным хвостом и может управлять мертвецами?
  options:
  - Бакэнэко
  - Нэкомата
  - Манэки-нэко
  - Кат Ши
  - Баюн
  correct_answer: 1
  explanation: В японских легендах нэкомата описывается как более опасное существо, чем бакэнэко; ее отличает раздвоенный хвост и магическая сила.
  correct_multi: null
  difficulty: 5
- id: q_nature_cats_anatomy_cat_001
  type: choice
  text: Сколько костей в среднем в скелете взрослой кошки?
  options:
  - '206'
  - '230'
  - '244'
  - '215'
  - '250'
  correct_answer: 1
  explanation: У кошек 230 костей, в то время как у людей их всего 206.
  correct_multi: null
  difficulty: 5
- id: q_nature_cats_anatomy_cat_043
  type: choice
  text: Какая часть тела кошки не имеет ключицы, соединенной с другими костями?
  options:
  - Хвост
  - Задние лапы
  - Плечевой пояс
  - Череп
  - Уши
  correct_answer: 2
  explanation: Ключицы кошек не крепятся к другим костям, что позволяет им пролезать в любую щель, где проходит голова.
  correct_multi: null
  difficulty: 4
- id: q_nature_cats_anatomy_cat_056
  type: choice
  text: На сколько больше костей в скелете кошки, чем у человека (206 костей)?
  options:
  - На 10 костей
  - На 24 кости
  - Столько же
  - Меньше на 20 костей
  - На 50 костей
  correct_answer: 1
  explanation: У кошки 230 костей, что на 24 больше, чем у человека, в основном за счет позвонков в хвосте.
  correct_multi: null
  difficulty: 4
- id: q_nature_cats_anatomy_cat_074
  type: choice
  text: Почему кошки могут пролезать в любые узкие щели, куда проходит их голова?
  options:
  - У них нет ребер
  - У них нет костей в спине
  - Их ключицы не соединены с другими костями скелета
  - Они могут уменьшаться в размерах
  - У них очень эластичная кожа
  correct_answer: 2
  explanation: Ключицы кошек «захоронены» в плечевых мышцах, что дает плечевому поясу огромную свободу.
  correct_multi: null
  difficulty: 5
- id: q_nature_cats_anatomy_cat_112
  type: choice
  text: На какой частоте обычно вибрирует кошачье мурлыканье, что способствует заживлению тканей?
  options:
  - 5-10 Гц
  - 25-150 Гц
  - 500-1000 Гц
  - 10 Гц
  - 200 Гц
  correct_answer: 1
  explanation: Мурлыканье происходит на частоте 25–150 Гц, которая совпадает с терапевтической частотой для восстановления мышц и костей.
  correct_multi: null
  difficulty: 5
