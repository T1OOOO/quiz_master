questions:
- id: q_dog_science_237
  type: choice
  difficulty: 5
  text: Какая порода собаки по кличке Милка вдохновила Жоржа де Местраля на изобретение
    липучки?
  options:
  - Лабрадор-ретривер
  - Ирландский пойнтер
  - Золотистый ретривер
  - Бордер-колли
  - Немецкая овчарка
  - Кокер-спаниель
  explanation: Милка была ирландским пойнтером, на шерсти которой инженер обнаружил
    колючки репейника.
  correct_answer: 1
- id: q_dog_science_41
  type: choice
  difficulty: 5
  text: Какое изобретение появилось благодаря колючкам растения, застрявшим в шерсти
    ирландского пойнтера?
  options:
  - Колючая проволока
  - Застежка-липучка (Velcro)
  - Щетка для волос
  - Крючок для рыбалки
  - Текстильный клей
