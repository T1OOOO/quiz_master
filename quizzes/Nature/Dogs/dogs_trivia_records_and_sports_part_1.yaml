id: 'dogs_trivia_records_and_sports_part_1'
title: 'Собачий спорт и факты (ч. 1)'
description: 'Всё о собаках: Факты о собаках и спорт (часть 1).'
category: 'Природа'

questions:
- id: q_dog_breeds_334
  type: choice
  difficulty: 7
  text: Какая уникальная норвежская порода собак имеет по 6 пальцев на каждой лапе для лазания по скалам?
  options:
  - Норвежский элькхаунд
  - Норвежский лундехунд
  - Норвежский бухунд
  - Финский шпиц
  - Самоед
  - Хаски
  explanation: Лундехунд был выведен для охоты на тупиков на крутых скалистых утесах.
  correct_answer: 1
- id: q_dog_biology_51
  type: choice
  difficulty: 6
  text: Чем пахнут лапы многих собак из-за специфических бактерий Proteus или Pseudomonas?
  options:
  - Свежескошенной травой
  - Кукурузными чипсами (Fritos)
  - Влажной землей
  - Ромашкой
  - Хвойным лесом
  - Старой кожей
  explanation: Это явление часто называют "Frito feet", оно вызвано естественной ферментацией бактерий в складках лап.
  correct_answer: 1
- id: q_dog_science_201
  type: choice
  difficulty: 5
  text: Какое бытовое приспособление было изобретено после того, как инженер Жорж де Местраль изучил семена репейника на шерсти своей собаки Милки?
  options:
  - Застежка-молния
  - Пластиковая заклепка
  - Застежка-липучка (Velcro)
  - Кнопка-автомат
  - Клейкая лента
  - Швейный крючок
  explanation: В 1941 году де Местраль заметил, как сотни мелких крючков цепляются за петли меха собаки. Это вдохновило его на создание синтетической системы крепления.
  correct_answer: 2
- id: q_dog_science_304
  type: choice
  difficulty: 4
  text: Колючки какого растения прилипли к шерсти собаки Милки, что привело к изобретению застежки-липучки Velcro?
  options:
  - Чертополох
  - Репейник (лопух)
  - Кактус
  - Дикая роза
  - Крапива
  - Ежевика
  explanation: Инженер Жорж де Местраль под микроскопом изучил семена репейника и обнаружил на них сотни крючков, цеплявшихся за петли меха.
  correct_answer: 1
- id: q_dog_biology_38
  type: choice
  difficulty: 3
  text: Через какую часть тела собаки в основном выделяют пот?
  options:
  - Через язык
  - Через подушечки лап
  - Через всю поверхность кожи
  - Через уши
  - Собаки вообще не потеют
  - Через нос
  explanation: У собак потовые железы расположены на подушечках лап, а основное охлаждение происходит через испарение с языка (одышку).
  correct_answer: 1
- id: q_dog_biology_64
  type: choice
  difficulty: 6
  text: В каком возрасте щенки обычно достигают половины своего взрослого веса?
  options:
  - В 2 месяца
  - В 4-5 месяцев
  - В 8 месяцев
  - В один год
  - В 6 месяцев
  - В 3 месяца
  explanation: Активный рост происходит в первые полгода, что дает ветеринарам понять итоговый размер собаки.
  correct_answer: 1
- id: q_dog_biology_262
  type: choice
  difficulty: 4
  text: Могут ли собаки распознавать болезни человека, такие как рак или диабет?
  options:
  - Нет, это миф
  - Да, по специфическим запахам и изменениям в организме
  - Только по жестам хозяина
  - Только собаки породы пудель
  - Да, но только у младенцев
  - Да, но только во время сна
  explanation: Собаки способны чуять химические изменения в теле человека, связанные с болезнями.
  correct_answer: 1
- id: q_dog_biology_277
  type: choice
  difficulty: 3
  text: Почему собаки обычно сворачиваются в клубок, когда спят?
  options:
  - Чтобы занять меньше места
  - Чтобы защитить жизненно важные органы и сохранить тепло
  - Это просто привычка из детства
  - Чтобы лучше слышать звуки
  - Так им удобнее видеть сны
  - Чтобы растянуть мышцы спины
  explanation: Это инстинктивное поведение для защиты уязвимых частей тела от хищников и холода.
  correct_answer: 1
- id: q_dog_biology_376
  type: choice
  difficulty: 3
  text: В каком единственном месте на теле собаки расположены активные потовые железы?
  options:
  - За ушами
  - На подушечках лап
  - На кончике носа
  - На животе
  - Вдоль позвоночника
  - Под мышками
  explanation: Поэтому собаки охлаждаются в основном через одышку (испарение с языка), а не через кожу тела.
  correct_answer: 1
- id: q_dog_biology_91
  type: choice
  difficulty: 3
  text: Правда ли, что собаки видят мир только в черно-белом цвете?
  options:
  - Да, это доказанный факт
  - Нет, они видят оттенки синего и желтого
  - Нет, они видят все цвета так же, как люди
  - Они видят только красный цвет
  - Они видят в инфракрасном диапазоне
  - Они видят только тени и движение
  explanation: Собаки не различают красный и зеленый, но их мир состоит из оттенков синего, желтого и серого.
  correct_answer: 1
- id: q_dog_science_367
  type: choice
  difficulty: 3
  text: Как называлась первая массовая робо-собака от компании Sony, выпущенная в 1999 году?
  options:
  - Spot
  - Aibo
  - Robo-Dog
  - Cyber-Pup
  - Tekno
  - K-9
  explanation: Aibo была разработана как домашний робот-компаньон, имитирующий поведение щенка.
  correct_answer: 1
- id: q_dog_science_390
  type: choice
  difficulty: 7
  text: Какое животное считается первым «истинным» представителем семейства псовых, жившим 30–40 млн лет назад?
  options:
  - Дикая кошка
  - Cynodictis (Цинодиктис)
  - Серый волк
  - Шакал
  - Гиена
  - Лиса
  explanation: Цинодиктис уже имел удлиненное тело и челюсти, характерные для современных собак.
  correct_answer: 1
- id: q_dog_sport_586
  text: Какое снаряжение необходимо для занятий Каникроссом (совместным бегом с собакой)?
  options:
  - Обычный поводок и ошейник
  - Пояс для бегуна, потяг с амортизатором и ездовая шлейка
  - Рюкзак для собаки
  - Кроссовки для лап
  explanation: Амортизирующий шнур (потяг) защищает спину человека и корпус собаки от резких рывков.
  correct_answer: 1
  difficulty: 5
- id: q_dog_sport_56
  type: choice
  difficulty: 6
  text: Как называется вид спорта, где собака и человек бегут в одной связке, причем собака помогает человеку тянуть его вперед?
  options:
  - Аджилити
  - Каникросс
  - Флайбол
  - Вейтпуллинг
  - Обидиенс
  - Курсинг
  explanation: Каникросс — это дисциплина бега с собакой, где используется специальный амортизирующий шнур (потяг).
  correct_answer: 1
- id: q_dog_biology_62
  type: choice
  difficulty: 5
  text: Какая температура тела считается нормальной для взрослой здоровой собаки?
  options:
  - 36.6°C
  - 38.3°C – 39.2°C
  - 37.0°C – 37.5°C
  - 40.0°C – 41.0°C
  - 35.5°C
  - 39.5°C – 40.5°C
  explanation: Нормальная температура у собак выше, чем у людей, и составляет в среднем 38,5 градусов.
  correct_answer: 1
- id: q_dog_biology_84
  type: choice
  difficulty: 5
  text: Могут ли собаки видеть сны так же, как люди?
  options:
  - Нет, их мозг слишком прост
  - Да, на стадии быстрого сна (REM) они проявляют те же паттерны мозга
  - Только собаки старше 5 лет
  - Только если спят рядом с человеком
  - Да, но они видят только запахи
  - Нет, они просто дергаются рефлекторно
  explanation: Исследования мозговых волн показывают, что собаки проходят те же стадии сна, что и люди, и, вероятно, видят сновидения.
  correct_answer: 1
- id: q_dog_science_576
  text: Результаты исследований в журнале Nature предполагают, что собаки могли быть одомашнены в двух регионах
  options:
  - Африка и Австралия
  - Восточная и Западная Евразия
  - Северная и Южная Америка
  - Китай и Индия
  explanation: Собаки могут происходить от двух разных популяций волков, которые позже смешались.
  correct_answer: 1
  difficulty: 5
