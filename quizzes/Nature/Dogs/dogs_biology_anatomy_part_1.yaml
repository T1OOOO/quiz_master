    Колорадо.
  correct_answer: 1
- id: q_dog_records_542
  text: Какова была громкость коллективного лая группы из 76 собак в штате Колорадо?
  options:
  - 100 дБ
  - 124 дБ
  - 150 дБ
  - 90 дБ
  explanation: Этот уровень шума сопоставим с громкостью рок-концерта.
  correct_answer: 1
