id: dogs_biology_anatomy_part_1
title: Биология и анатомия собак (ч. 1)
description: 'Всё о собаках: Биология и анатомия собак (часть 1).'
category: Природа
questions:
- id: q_dog_media_298
  type: choice
  difficulty: 5
  text: '"Какая собака-блогер породы мопс стала известна в интернете своими предсказаниями
    дня ("No Bones" или "Bones Day")?"'
  options:
  - Нудл (Noodle)
  - Даг (Doug the Pug)
  - Фрэнк
  - Отис
  - Моти
  - Персик
  explanation: 13-летний мопс Нудл из TikTok определял настроение дня тем, мог ли
    он стоять ("bones") или падал ("no bones").
  correct_answer: 0
- id: q_dog_breeds_78
  type: choice
  difficulty: 8
  text: У какой уникальной норвежской породы собак по 6 пальцев на каждой лапе и суставы,
    позволяющие выворачивать лапы под прямым углом?
  options:
  - Норвежский элькхаунд
  - Норвежский лундехунд
  - Норвежский бухунд
  - Финский шпиц
  - Шведский валльхунд
  - Самоед
  explanation: Лундехунд был выведен для охоты на тупиков на крутых скалах, где требовалась
    исключительная цепкость и гибкость.
  correct_answer: 1
- id: q_dog_breeds_61
  type: choice
  difficulty: 4
  text: Какая порода собак славится своими перепончатыми лапами и водоотталкивающей
    шерстью, так как помогала рыбакам вытягивать сети?
  options:
  - Золотистый ретривер
  - Ньюфаундленд
  - Лабрадор
  - Ирландский водяной спаниель
  - Португальская водяная собака
  - Испанская водяная собака
  explanation: Ньюфаундленды — прирожденные спасатели и пловцы с уникальными анатомическими
    особенностями для работы в воде.
  correct_answer: 1
- id: q_dog_records_540
  text: Какая порода собаки Пурин из Японии, которая ловит мячи лапами и прыгает через
    скакалку?
  options:
  - Пудель
  - Бигль
  - Джек-рассел-терьер
  - Ши-тцу
  explanation: Бигль Пурин удерживает рекорд по самому быстрому перемещению на мяче
    (10 метров за 9,45 сек).
  correct_answer: 1
  difficulty: 5
  type: choice
- id: q_dog_breeds_230
  type: choice
  difficulty: 4
  text: Какая охотничья порода известна своим «белым кончиком хвоста», который позволял
    охотникам видеть собаку в высокой траве?
  options:
  - Бигль
  - Такса
  - Бассет-хаунд
  - Бладхаунд
  - Веймаранер
  - Риджбек
  explanation: Для чистокровного бигля белый кончик хвоста (flag) является обязательным
    стандартом.
  correct_answer: 0
- id: q_dog_breeds_236
  type: choice
  difficulty: 6
  text: Какая порода собак внешне напоминает ягненка из-за своей грушевидной головы
    и белой кучерявой шерсти?
  options:
  - Бедлингтон-терьер
  - Пудель
  - Бишон-фризе
  - Керри-блю-терьер
  - Эледел-терьер
  - Денди-динмонт-терьер
  explanation: Бедлингтон-терьеры часто сравниваются с овечками, но обладают храбрым
    сердцем терьера.
  correct_answer: 0
- id: q_dog_media_286
  type: choice
  difficulty: 6
  text: '"Какой пес породы джек-рассел-терьер получил премию "Golden Collar" за роль
    в оскароносном фильме «Артист»?"'
  options:
  - Угги (Uggie)
  - Космо
  - Скиппи
  - Пенни
  - Макс
  - Джек
  explanation: Угги покорил сердца зрителей своей игрой в немом кино и стал первой
    собакой, оставившей отпечатки лап у Китайского театра Граумана.
  correct_answer: 0
- id: q_dog_biology_43
  type: choice
  difficulty: 8
  text: Сколько мышц управляют движением каждого уха у собаки?
  options:
  - '5'
  - '18'
  - '10'
  - '32'
  - '12'
  - '24'
  explanation: У собак минимум 18 мышц в каждом ухе, что позволяет им двигать ушами
    независимо и точно определять источник звука.
  correct_answer: 1
- id: q_dog_biology_392
  type: choice
  difficulty: 4
  text: Сколько отдельных мышц управляют движениями каждого уха собаки, позволяя им
    вращаться независимо?
  options:
  - 5 мышц
  - 18 мышц
  - 10 мышц
  - 32 мышцы
  - 12 мышц
  - 24 мышцы
  explanation: Это в два раза больше, чем у человека, что обеспечивает собакам феноменальную
    способность локализовать звук.
  correct_answer: 1
- id: q_dog_history_358
  type: choice
  difficulty: 4
  text: В каком парке мира установлен памятник хаски Балто с надписью «Выносливость,
    Верность, Интеллект»?
  options:
  - Гайд-парк (Лондон)
  - Центральный парк (Нью-Йорк)
  - Александровский сад (Москва)
  - Парк Горького (Минск)
  - Уэно (Токио)
  - Тамани (Сеул)
  explanation: Скульптор Фредерик Рот запечатлел Балто в бронзе в самом сердце Нью-Йорка
    в 1925 году.
  correct_answer: 1
- id: q_dog_biology_225
  type: choice
  difficulty: 4
  text: Сколько зубов у взрослой здоровой собаки при правильном развитии?
  options:
  - '32'
  - '42'
  - '30'
  - '44'
  - '28'
  - '38'
  explanation: У взрослых собак 42 зуба, включая резцы, клыки, премоляры и моляры.
    Они окончательно формируются к 12–24 месяцам.
  correct_answer: 1
- id: q_dog_biology_297
  type: choice
  difficulty: 5
  text: На какой стадии сна собаки могут подергивать лапами и «бежать» лежа?
  options:
  - Глубокий сон
  - Быстрый сон (REM)
  - Поверхностный сон
  - Дремота
  - Медитация
  - Расслабление
  explanation: В этой фазе мозговые волны собаки наиболее активны, как при бодрствовании.
  correct_answer: 1
- id: q_dog_biology_332
  type: choice
  difficulty: 3
  text: Какое количество постоянных зубов должно быть у взрослой здоровой собаки?
  options:
  - 32 зуба
  - 42 зуба
  - 38 зубов
  - 44 зуба
  - 30 зубов
  - 36 зубов
  explanation: Полный комплект включает резцы, клыки, премоляры и моляры, формирующиеся
    к 2 годам.
  correct_answer: 1
- id: q_dog_biology_287
  type: choice
  difficulty: 5
  text: Какая часть организма собаки наиболее важна для терморегуляции при одышке?
  options:
  - Уши
  - Язык
  - Подушечки лап
  - Нос
  - Хвост
  - Живот
  explanation: Испарение влаги с языка — основной способ охлаждения собаки.
  correct_answer: 1
- id: q_dog_records_319
  type: choice
  difficulty: 6
  text: Какова была громкость коллективного лая группы из 76 собак в Колорадо, сопоставимая
