id: 'vocabulary_foreign'
title: 'Иностранные заимствования'
description: 'Тонкости языка и богатство словарного запаса.'
category: 'Филология'

questions:
  - id: q_vocabulary_100_3
    type: choice
    difficulty: 3
    text: 'Слово **аутентичный** означает:'
    options:
      - стилизованный под старину
      - самобытный
      - подлинный, соответствующий оригиналу
      - экзотический
      - редкий
      - имеющий автора
    correct_answer: 2
    explanation: '**Аутентичный** (от греч. authentikos) — подлинный, настоящий, соответствующий оригиналу.'
  - id: q_vocabulary_100_4
    type: choice
    difficulty: 4
    text: Кто такой **визави**?
    options:
      - близкий друг
      - враг или соперник
      - посредник в споре
      - собеседник, сидящий напротив
      - свидетель происшествия
      - человек, стоящий сзади
    correct_answer: 3
    explanation: '**Визави** (франц. vis-à-vis — лицом к лицу) — тот, кто находится напротив.'
  - id: q_vocabulary_100_6
    type: choice
    difficulty: 6
    text: 'Значение слова **синекура**:'
    options:
      - государственная должность
      - медицинская процедура
      - работа, не требующая особых усилий, но приносящая доход
      - забота о больных
      - вид наказания
      - старинная рукопись
    correct_answer: 2
    explanation: '**Синекура** (лат. sine cura — без заботы) — хорошо оплачиваемая должность, не требующая большого труда.'
  - id: q_vocabulary_100_7
    type: choice
    difficulty: 8
    text: Что такое **симулякр**?
    options:
      - человек, притворяющийся больным
      - механическая кукла
      - копия того, чего на самом деле не существует
      - математическая модель
      - ложное воспоминание
      - тип галлюцинации
    correct_answer: 2
    explanation: '**Симулякр** — изображение или подобие того, чего нет в реальности (копия без оригинала).'
  - id: q_vocabulary_100_9
    type: choice
    difficulty: 7
    text: Что значит **фраппировать**?
    options:
      - готовить холодный кофе
      - неприятно поразить или удивить
      - украшать одежду кружевом
      - громко кричать
      - быстро бегать
      - охлаждать напитки
    correct_answer: 1
    explanation: '**Фраппировать** (франц. frapper) — неприятно поражать, ошеломлять.'
  - id: q_vocabulary_100_12
    type: choice
    difficulty: 9
    text: 'Слово **пудромантель** в прошлом означало:'
    options:
      - шкаф для косметики
      - дамскую шляпку
      - накидку, которую надевали при пудрении волос
      - вид дорогого парфюма
      - щетку для чистки платья
      - парикмахерское кресло
    correct_answer: 2
    explanation: '**Пудромантель** — специальная накидка, защищающая одежду при пудрении прически.'
  - id: q_vocabulary_100_13
    type: choice
    difficulty: 8
    text: Что такое **пендельтюр**?
    options:
      - деталь часового механизма
      - дверь на петлях, открывающаяся в обе стороны
      - вид наказания в школе
      - старинный головной убор
      - тип оконной рамы
      - рычаг управления
    correct_answer: 1
    explanation: '**Пендельтюр** — дверь на качающихся петлях, открывающаяся в обе стороны.'
  - id: q_vocabulary_100_20
    type: choice
    difficulty: 4
    text: 'Выражение **комильфо** дословно переводится как:'
    options:
      - очень красиво
      - как надо, как следует
      - хорошая компания
      - богатый дом
      - вкусная еда
      - чистая одежда
    correct_answer: 1
    explanation: '**Комильфо** (франц. comme il faut) — как должно, как подобает; прилично.'
  - id: q_vocabulary_100_21
    type: choice
    difficulty: 3
    text: Что такое **моветон**?
    options:
      - тяжелый рок
      - дурной тон, неприличное поведение
      - старинный танец
      - вид верхней одежды
      - музыкальный термин
      - грустная песня
    correct_answer: 1
    explanation: '**Моветон** (франц. mauvais ton) — дурной тон, невоспитанность.'
  - id: q_vocabulary_100_22
    type: choice
    difficulty: 5
    text: 'Слово **суаре** означает:'
    options:
      - дневной отдых
      - светский вечер, вечеринку
      - вид десерта
      - утреннюю молитву
      - прогулку на лошадях
      - тип ткани
    correct_answer: 1
    explanation: '**Суаре** (франц. soirée) — званый вечер.'
  - id: q_vocabulary_100_23
    type: choice
    difficulty: 6
    text: Что такое **матине**?
    options:
      - завтрак на траве
      - дневной спектакль или праздник
      - вид женской прически
      - утренняя гимнастика
      - сорт кофе
      - зимнее пальто
    correct_answer: 1
    explanation: '**Матине** (франц. matinée) — утренний или дневной прием, концерт, спектакль.'
  - id: q_vocabulary_100_24
    type: choice
    difficulty: 6
    text: Каково значение термина **журфикс**?
    options:
      - быстрая запись
      - определенный день недели для приема гостей
      - исправление ошибок
      - газета новостей
      - срочное дело
      - вид крепления в технике
    correct_answer: 1
    explanation: '**Журфикс** (франц. jour fixe) — фиксированный день для приема гостей.'
  - id: q_vocabulary_100_25
    type: choice
    difficulty: 4
    text: 'Слово **плезир** употребляется в значении:'
    options:
      - подарок
      - удовольствие, развлечение
      - просьба
      - приказ
      - болезнь
      - прогулка
    correct_answer: 1
    explanation: '**Плезир** (франц. plaisir) — удовольствие, забава, потеха.'
  - id: q_vocabulary_100_26
    type: choice
    difficulty: 7
    text: Кто такой **parvenu** (парвеню)?
    options:
      - официант
      - выскочка, человек низкого происхождения, быстро разбогатевший
      - французский аристократ
      - верный слуга
      - учитель танцев
      - иностранный гость
    correct_answer: 1
    explanation: '**Парвеню** — человек, проникший в высшее общество, но не усвоивший его манер (выскочка).'
  - id: q_vocabulary_100_27
    type: choice
    difficulty: 3
    text: Что означает слово **бомонд**?
    options:
      - большой мир
      - высший свет, аристократическое общество
      - вид горы
      - модный магазин
      - тип прически
      - праздничный салют
    correct_answer: 1
    explanation: '**Бомонд** (франц. beau monde) — изысканное общество, высший свет.'
  - id: q_vocabulary_100_28
    type: choice
    difficulty: 2
    text: 'Значение слова **рандеву**:'
    options:
      - случайная встреча
      - заранее условленное свидание
      - прогулка по парку
      - морское путешествие
      - тип лодки
      - прощальный ужин
    correct_answer: 1
    explanation: '**Рандеву** (франц. rendez-vous) — свидание, условленная встреча.'
  - id: q_vocabulary_100_29
    type: choice
    difficulty: 4
    text: Что такое **адюльтер**?
    options:
      - взросление
      - супружеская измена
      - соревнование
      - вид спорта
      - тяжелый характер
      - секретная переписка
    correct_answer: 1
    explanation: '**Адюльтер** (франц. adultère) — супружеская неверность.'
  - id: q_vocabulary_100_10
    type: choice
    difficulty: 5
    text: Что такое **хьюмидор**?
    options:
      - прибор для измерения влажности
      - ящик для хранения сигар с поддержкой влажности
      - порода декоративных собак
      - тропический фрукт
      - тип кондиционера
      - музыкальный инструмент
    correct_answer: 1
    explanation: '**Хьюмидор** (лат. humidus — влажный) — ящик для хранения сигар.'
  - id: q_vocabulary_100_90
    type: choice
    difficulty: 5
    text: Что такое **карт-бланш**?
    options:
      - белая карта
      - неограниченные полномочия, полная свобода действий
      - чистое белье
      - пустой билет
      - проигрыш в карты
      - меню ресторана
    correct_answer: 1
    explanation: '**Карт-бланш** (франц. carte blanche — пустой бланк) — неограниченные полномочия.'
  - id: q_vocabulary_100_91
    type: choice
    difficulty: 4
    text: Что значит **тет-а-тет**?
    options:
      - голова к голове
      - с глазу на глаз, наедине
      - тест на внимательность
      - вид танца
      - детская игра
      - спор двух людей
    correct_answer: 1
    explanation: '**Тет-а-тет** (франц. tête-à-tête) — разговор наедине.'