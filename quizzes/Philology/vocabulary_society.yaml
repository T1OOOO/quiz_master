id: 'vocabulary_society'
title: 'Этикет и общество'
description: 'Тонкости языка и богатство словарного запаса.'
category: 'Филология'

questions:
  - id: q_vocabulary_200_1
    type: choice
    difficulty: 2
    text: Что считается уместным делать, знакомя людей друг с другом?
    options:
      - просто назвать имена
      - дать краткую «справку» о каждом (например, профессию или хобби)
      - рассказать об их материальном положении
      - промолчать и дать им самим представиться
      - обнять обоих
      - попросить их предъявить документы
    correct_answer: 1
    explanation: '**Дать краткую справку** — это помогает завязать беседу.'
  - id: q_vocabulary_200_2
    type: choice
    difficulty: 3
    text: Кто должен здороваться первым, входя в помещение?
    options:
      - младший по званию
      - самый старший по возрасту
      - женщина
      - любой входящий, независимо от пола и статуса
      - тот, кого первым заметили
      - никто, нужно ждать, пока поприветствуют хозяева
    correct_answer: 3
    explanation: '**Любой входящий** приветствует присутствующих первым.'
  - id: q_vocabulary_200_4
    type: choice
    difficulty: 5
    text: Кто по правилам этикета должен первым подавать руку для рукопожатия?
    options:
      - мужчина — женщине
      - подчиненный — начальнику
      - младший — старшему
      - человек, которому представили незнакомца (например, женщина — мужчине)
      - тот, кто пришел последним
      - тот, у кого свободны руки
    correct_answer: 3
    explanation: Руку для рукопожатия первым подает **старший по статусу** (женщина мужчине, начальник подчиненному, старший младшему).
  - id: q_vocabulary_200_10
    type: choice
    difficulty: 4
    text: 'В зрительный зал (театр, кино) к своим местам следует проходить:'
    options:
      - спиной к сидящим
      - лицом к сидящим
      - боком, опустив голову
      - только если все остальные места еще не заняты
      - пригнувшись, чтобы не загораживать экран
      - мужчина должен идти позади женщины
    correct_answer: 1
    explanation: Проходить к своему месту нужно всегда **лицом к сидящим**.
  - id: q_vocabulary_200_11
    type: choice
    difficulty: 3
    text: Какое правило этикета касается мужской и женской сумки?
    options:
      - мужчина обязан носить сумку своей спутницы, если она тяжелая
      - мужчина никогда не носит женскую сумку
      - сумку должен нести самый младший в компании
      - женщина должна нести сумку мужчины, если он в костюме
      - сумку нужно катить по полу
      - сумки следует оставлять у входа
    correct_answer: 1
    explanation: '**Мужчина никогда не носит женскую сумку** (дамскую сумочку), это нарушение этикета.'
  - id: q_vocabulary_200_13
    type: choice
    difficulty: 3
    text: 'Если в ресторане звучит фраза «Я вас приглашаю», это означает, что:'
    options:
      - каждый платит сам за себя
      - платит тот, кто заказал больше блюд
      - платит тот, кто пригласил
      - счет делится пополам
      - платит мужчина, даже если пригласила женщина
      - платит женщина
    correct_answer: 2
    explanation: Фраза «Я вас приглашаю» означает, что **платит приглашающий**.
  - id: q_vocabulary_200_20
    type: choice
    difficulty: 2
    text: Кого называют **early bird**?
    options:
      - человека, который любит петь по утрам
      - человека, который рано встает или делает что-либо раньше других
      - неопытного сотрудника
      - человека с тонкими руками
      - любителя домашних птиц
      - того, кто постоянно опаздывает
    correct_answer: 1
    explanation: '**Early bird** («ранняя пташка») — человек, который рано встает («жаворонок»).'
  - id: q_vocabulary_200_21
    type: choice
    difficulty: 5
    text: 'Если о человеке говорят **down-to-earth**, он:'
    options:
      - очень низкого роста
      - любит заниматься садоводством
      - практичный, приземленный, без лишних иллюзий
      - скрытный и хитрый
      - грустный и депрессивный
      - очень богатый
    correct_answer: 2
    explanation: '**Down-to-earth** — приземленный, реалистичный, практичный человек.'
  - id: q_vocabulary_200_23
    type: choice
    difficulty: 4
    text: Кто такой **social butterfly**?
    options:
      - человек, часто меняющий работу
      - общительный, харизматичный человек, любящий социализироваться
      - коллекционер насекомых
      - очень скромный и застенчивый человек
      - политический деятель
      - человек, который не умеет одеваться
    correct_answer: 1
    explanation: '**Social butterfly** — очень общительный человек, «порхающий» от собеседника к собеседнику.'
  - id: q_vocabulary_200_25
    type: choice
    difficulty: 4
    text: О ком говорят **behind the times**?
    options:
      - о том, кто всегда приходит вовремя
      - о старомодном человеке, отставшем от времени
      - о путешественнике во времени
      - о человека с плохими часами
      - об историке
      - о самом быстром бегуне
    correct_answer: 1
    explanation: '**Behind the times** — отставший от жизни, старомодный.'
  - id: q_vocabulary_200_27
    type: choice
    difficulty: 6
    text: Кто такой **cheapskate**?
    options:
      - мастер по фигурному катанию
      - скряга, жадный человек, который боится потратить лишнее
      - дешевая вещь
      - человек, который быстро бегает
      - продавец уличной еды
      - экономный, но мудрый хозяин
    correct_answer: 1
    explanation: '**Cheapskate** — скряга, крохобор.'
  - id: q_vocabulary_200_30
    type: choice
    difficulty: 3
    text: 'Слово **adaptable** означает, что человек:'
    options:
      - очень упрямый
      - легко приспосабливающийся к новым условиям
      - часто болеет
      - любит одиночество
      - имеет музыкальный слух
      - профессиональный переводчик
    correct_answer: 1
    explanation: '**Adaptable** — легко адаптирующийся, гибкий.'
  - id: q_vocabulary_200_31
    type: choice
    difficulty: 7
    text: 'Прилагательное **conscientious** описывает человека как:'
    options:
      - обладающего чистой совестью
      - добросовестного, старательного и ответственного в работе
      - верующего в Бога
      - очень разговорчивого
      - высокомерного
      - медлительного
    correct_answer: 1
    explanation: '**Conscientious** — добросовестный, сознательный.'
  - id: q_vocabulary_200_32
    type: choice
    difficulty: 6
    text: Кто такой **shrewd** человек?
    options:
      - грубый и неотесанный
      - проницательный, умный, умеющий видеть суть
      - очень богатый наследник
      - постоянно сомневающийся
      - злой и мстительный
      - ленивый
    correct_answer: 1
    explanation: '**Shrewd** — проницательный, дальновидный, умный.'
  - id: q_vocabulary_200_33
    type: choice
    difficulty: 6
    text: 'Значение слова **eloquent**:'
    options:
      - имеющий длинные ноги
      - очень элегантный
      - красноречивый, обладающий даром убедительной речи
      - скрытный
      - знающий много языков
      - тихий
    correct_answer: 2
    explanation: '**Eloquent** — красноречивый.'
  - id: q_vocabulary_200_36
    type: choice
    difficulty: 4
    text: Кто такой **ambitious** человек?
    options:
      - имеющий вредные привычки
      - честолюбивый, стремящийся к успеху и достижениям
      - очень высокий
      - любящий путешествовать
      - двуличный
      - скромный
    correct_answer: 1
    explanation: '**Ambitious** — амбициозный, целеустремленный.'
  - id: q_vocabulary_200_37
    type: choice
    difficulty: 7
    text: 'Слово **sophisticated** при описании личности означает:'
    options:
      - запутанный в делах
      - изысканный, утонченный, со сложным внутренним миром
      - очень старый
      - имеющий техническое образование
      - высокомерный парвеню
      - любящий простую жизнь
    correct_answer: 1
    explanation: '**Sophisticated** — утонченный, искушенный, сложный.'
  - id: q_vocabulary_200_38
    type: choice
    difficulty: 5
    text: 'Значение слова **unbiased**:'
    options:
      - не имеющий цели
      - беспристрастный, справедливый, объективный
      - очень тихий
      - не умеющий петь
      - постоянно ошибающийся
      - добрый
    correct_answer: 1
    explanation: '**Unbiased** — беспристрастный, непредвзятый.'
  - id: q_vocabulary_200_39
    type: choice
    difficulty: 6
    text: 'Прилагательное **diligent** — это:'
    options:
      - богатый
      - прилежный, старательный
      - быстрый
      - скучный
      - аккуратный в одежде
      - честный
    correct_answer: 1
    explanation: '**Diligent** — прилежный, усердный.'
  - id: q_vocabulary_100_44
    type: choice
    difficulty: 3
    text: Кто такой **сноб**?
    options:
      - бедный студент
      - человек, надменно относящийся к тем, кто ниже по статусу
      - мастер по ремонту обуви
      - очень добрый человек
      - скромный исследователь
      - любитель спорта
    correct_answer: 1
    explanation: '**Сноб** — человек, претендующий на изысканный вкус и пренебрежительно относящийся к «простолюдинам».'