id: 'vocabulary_intellectual'
title: 'Интеллектуальный лексикон'
description: 'Тонкости языка и богатство словарного запаса.'
category: 'Филология'





  - id: q_vocabulary_200_60
    type: choice
    difficulty: 8
    text: Что такое **мейоз** в риторике?
    options:
      - биологический процесс
      - преднамеренное занижение размера или важности предмета
      - повторение звуков
      - очень длинное предложение
      - скрытая насмешка
      - логическая ошибка
    correct_answer: 1
    explanation: '**Мейоз** — риторический прием, состоящий в намеренном преуменьшении (ср. с гиперболой).'
  - id: q_vocabulary_200_61
    type: choice
    difficulty: 9
    text: 'Риторический прием **апофазис** — это:'
    options:
      - резкое отрицание всего
      - упоминание предмета через отрицание того, что о нем нужно говорить
      - замена слов синонимами
      - обращение к богам
      - повторение конца фразы
      - использование сложных терминов
    correct_answer: 1
    explanation: '**Апофазис** — прием, когда оратор заявляет, что не будет говорить о чем-то, тем самым упоминая это.'
  - id: q_vocabulary_200_62
    type: choice
    difficulty: 8
    text: Что такое **хиазм**?
    options:
      - тип греческого храма
      - перемена порядка фраз или слов для создания баланса (инверсия)
      - вид рифмы
      - очень громкий крик
      - использование только гласных звуков
      - научное доказательство
    correct_answer: 1
    explanation: '**Хиазм** — перекрестное расположение параллельных частей в двух смежных фразах (А-Б, Б-А).'
  - id: q_vocabulary_200_63
    type: choice
    difficulty: 7
    text: 'Прием **анадиплез** заключается в:'
    options:
      - пропуске союзов
      - использовании слова в конце предложения и в начале следующего (цепочка)
      - подражании звукам животных
      - использовании матерных слов
      - сокращении всех слов
      - обратном порядке букв
    correct_answer: 1
    explanation: '**Анадиплез** (подхват) — повторение конца одной фразы в начале следующей.'
  - id: q_vocabulary_200_66
    type: choice
    difficulty: 9
    text: 'Термин **аброгация** означает:'
    options:
      - путь к спасению
      - отмена или изменение старого закона
      - сельскохозяйственный термин
      - сокращение текста
      - ошибка в письме
      - вид молитвы
    correct_answer: 1
    explanation: '**Аброгация** — отмена устаревшего закона.'