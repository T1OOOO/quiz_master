id: 'vocabulary_art_culture'
title: 'Лексика: Искусство и культура'
description: 'Тонкости языка и богатство словарного запаса.'
category: 'Филология'

questions:
  - id: q_vocabulary_100_16
    type: choice
    difficulty: 3
    text: 'Основное назначение **пюпитра**:'
    options:
      - служить подставкой для ног
      - хранить ценные бумаги
      - поддерживать ноты или книги при чтении
      - быть столом для письма
      - украшать интерьер
      - защищать от солнца
    correct_answer: 2
    explanation: '**Пюпитр** — подставка для нот или книг.'
  - id: q_vocabulary_100_19
    type: choice
    difficulty: 4
    text: Как называется подсвечник с разветвлениями для нескольких свечей?
    options:
      - лампада
      - канделябр
      - бра
      - торшер
      - люстра
      - паникадило
    correct_answer: 1
    explanation: '**Канделябр** — декоративный подсвечник для нескольких свечей.'
  - id: q_vocabulary_100_30
    type: choice
    difficulty: 8
    text: 'Техника **кьяроскуро** в живописи — это:'
    options:
      - рисование углем
      - игра света и тени, контрастное противопоставление
      - создание мозаики
      - роспись по мокрой штукатурке
      - техника размытых контуров
      - использование золотой краски
    correct_answer: 1
    explanation: '**Кьяроскуро** (светотень) — градации светлого и темного, распределение цветов и оттенков в живописи.'
  - id: q_vocabulary_100_31
    type: choice
    difficulty: 8
    text: Что такое **сфумато**?
    options:
      - вид скульптуры
      - смягчение очертаний, эффект «дымчатости»
      - быстрая зарисовка
      - яркий солнечный свет на картине
      - тип масляных красок
      - наложение нескольких слоев лака
    correct_answer: 1
    explanation: '**Сфумато** — прием в живописи (разработанный Леонардо да Винчи), смягчающий очертания фигур и предметов («дымка»).'
  - id: q_vocabulary_100_32
    type: choice
    difficulty: 8
    text: Что означает термин **гризайль**?
    options:
      - рисование на дереве
      - вид однотонной живописи, обычно серого цвета
      - использование ярких пятен
      - техника гравировки
      - покрытие картины воском
      - изображение цветов
    correct_answer: 1
    explanation: '**Гризайль** — вид живописи, выполняемой тоновыми градациями одного цвета (чаще всего серого или сепии).'
  - id: q_vocabulary_100_33
    type: choice
    difficulty: 6
    text: 'Слово **эклектика** означает:'
    options:
      - полное отрицание стилей
      - соединение разнородных, часто несовместимых стилей
      - древнегреческий храм
      - современный дизайн
      - науку об электричестве
      - строгое следование канонам
    correct_answer: 1
    explanation: '**Эклектика** — смешение, соединение разнородных стилей, идей, взглядов.'
  - id: q_vocabulary_100_34
    type: choice
    difficulty: 5
    text: Что такое **катарсис**?
    options:
      - тяжелая болезнь
      - душевное очищение через переживание сильных эмоций
      - тип театральной занавески
      - историческое событие
      - падение Римской империи
      - высшая точка развития сюжета
    correct_answer: 1
    explanation: '**Катарсис** (в искусстве и психологии) — очищение, возвышение души через трагическое потрясение.'
  - id: q_vocabulary_100_35
    type: choice
    difficulty: 5
    text: 'Значение слова **мизансцена**:'
    options:
      - за кулисами театра
      - расположение актеров и предметов на сцене
      - главный актер спектакля
      - театральный буфет
      - короткий перерыв
      - сцена из фильма
    correct_answer: 1
    explanation: '**Мизансцена** — расположение актеров на сцене в определенный момент спектакля.'
  - id: q_vocabulary_100_36
    type: choice
    difficulty: 7
    text: 'Слово **пастиш** — это:'
    options:
      - вкусное блюдо
      - вторичное произведение, имитирующее стиль другого автора
      - техника реставрации
      - клей для декораций
      - короткий рассказ
      - театральный костюм
    correct_answer: 1
    explanation: '**Пастиш** — произведение искусства, стилизованное под стиль другого автора или эпохи (иногда с иронией).'
  - id: q_vocabulary_100_37
    type: choice
    difficulty: 4
    text: Кто такой **мозаичист**?
    options:
      - коллекционер камней
      - мастер по созданию узоров из мозаики
      - архитектор храмов
      - ученый-геолог
      - художник-пейзажист
      - человек со сложным характером
    correct_answer: 1
    explanation: '**Мозаичист** — художник, создающий мозаику.'
  - id: q_vocabulary_100_38
    type: choice
    difficulty: 6
    text: Что такое **абрис**?
    options:
      - сорт абрикоса
      - контурный рисунок, набросок
      - тип ткани
      - деталь корабля
      - старинная монета
      - музыкальный лад
    correct_answer: 1
    explanation: '**Абрис** — линейное очертание предмета, контур.'
  - id: q_vocabulary_100_39
    type: choice
    difficulty: 6
    text: Каково значение слова **анфилада**?
    options:
      - длинная очередь
      - ряд комнат, двери которых расположены на одной оси
      - вид парадной лестницы
      - украшение на колонне
      - тип кружева
      - военный маневр
    correct_answer: 1
    explanation: '**Анфилада** — ряд последовательно примыкающих друг к другу помещений, дверные проемы которых расположены на одной оси.'
  - id: q_vocabulary_700_33
    type: choice
    difficulty: 8
    text: Какое название получила разновидность графики кьяроскуро во Франции?
    options:
      - Пастиш
      - Камайо́
      - Гризайль
      - Сфумато
      - Дефиле
      - Офорт
    correct_answer: 1
    explanation: '**Камайо́** (camaïeu) — техника живописи одним цветом (монохромная), разновидность гризайли или кьяроскуро.'
  - id: q_vocabulary_700_34
    type: choice
    difficulty: 8
    text: Кто из мастеров считается великим реформатором живописи Раннего Возрождения, использовавшим объёмность в «Триптихе Сан Джовенале»?
    options:
      - Караваджо
      - Томмазо Мозаччо
      - Рубенс
      - Веласкес
      - Рафаэль
      - Рембрандт
    correct_answer: 1
    explanation: '**Томмазо Мазаччо** — флорентийский художник, реформатор живописи кватроченто.'
  - id: q_vocabulary_400_62
    type: choice
    difficulty: 6
    text: Как называется метод живописи, родоначальником которого стал Караваджо?
    options:
      - импрессионизм
      - караваджизм (усиление светотеневых эффектов, тенебросо)
      - кубизм
      - барокко
      - романтизм
      - классицизм
    correct_answer: 1
    explanation: '**Караваджизм** — стиль, характеризующийся драматическим использованием света и тени (кьяроскуро).'
  - id: q_vocabulary_700_31
    type: choice
    difficulty: 5
    text: Какое произведение Леонардо да Винчи считается эталоном техники сфумато?
    options:
      - «Тайная вечеря»
      - «Мона Лиза» (Джоконда)
      - «Дама с горностаем»
      - «Витрувианский человек»
      - «Мадонна в скалах»
      - «Поклонение волхвов»
    correct_answer: 1
    explanation: '**«Мона Лиза»** — величайший пример использования сфумато (мягких тональных переходов) Леонардо да Винчи.'