id: 'vocabulary_church_slavonic'
title: 'Церковнославянизмы'
description: 'Тонкости языка и богатство словарного запаса.'
category: 'Филология'





  - id: q_vocabulary_200_70
    type: choice
    difficulty: 6
    text: Что такое **агиасма**?
    options:
      - вид церковного пения
      - святая вода, освященная на Крещение
      - название греческого города
      - церковный праздник
      - тип иконы
      - медная чаша
    correct_answer: 1
    explanation: '**Агиасма** (греч. святыня) — вода, освященная в праздник Богоявления (Крещения).'
  - id: q_vocabulary_200_71
    type: choice
    difficulty: 5
    text: 'В Библии под **акридами** подразумеваются:'
    options:
      - морские существа
      - саранча или кузнечики, употребляемые в пищу
      - ядовитые ягоды
      - древние свитки
      - камни в пустыне
      - дикие пчелы
    correct_answer: 1
    explanation: '**Акриды** — вид саранчи, которой питался Иоанн Креститель в пустыне.'
  - id: q_vocabulary_200_72
    type: choice
    difficulty: 7
    text: Что такое **алавастр**?
    options:
      - строительный материал
      - узкогорлый сосуд для хранения благовоний (мира)
      - музыкальный инструмент
      - белый камень
      - деталь алтаря
      - старинная монета
    correct_answer: 1
    explanation: '**Алавастр** — сосуд для благовоний (мирница).'
  - id: q_vocabulary_200_73
    type: choice
    difficulty: 5
    text: 'Слово **антипасха** означает:'
    options:
      - запрет на празднование Пасхи
      - воскресенье, следующее за Пасхой (обновление праздника)
      - день перед постом
      - языческий праздник
      - поминальный день
      - пятница перед Пасхой
    correct_answer: 1
    explanation: '**Антипасха** («вместо Пасхи») — первое воскресенье после Пасхи (Фомино воскресенье).'
  - id: q_vocabulary_200_75
    type: choice
    difficulty: 6
    text: Что такое **багряница**?
    options:
      - куст с красными ягодами
      - одежда пурпурного цвета (порфира)
      - старинная краска
      - красный закат
      - вид церковной вышивки
      - красные чернила
    correct_answer: 1
    explanation: '**Багряница** — пурпурная мантия, символ царской власти (в которую одели Христа при поругании).'
  - id: q_vocabulary_200_76
    type: choice
    difficulty: 4
    text: 'Значение слова **бдение**:'
    options:
      - долгий сон
      - бодрствование, отсутствие сна (молитвенное)
      - внимательный взгляд
      - дежурство у ворот
      - приготовление пищи
      - ленивое состояние
    correct_answer: 1
    explanation: '**Бдение** — состояние бодрствования (всенощное бдение).'
  - id: q_vocabulary_200_77
    type: choice
    difficulty: 7
    text: 'Прилагательное **безлетно** означает:'
    options:
      - зимой
      - вечно, не имея начала и конца
      - очень быстро
      - безрезультатно
      - тайно
      - скучно
    correct_answer: 1
    explanation: '**Безлетно** — вне времени, вечно, «прежде всех веков».'
  - id: q_vocabulary_200_78
    type: choice
    difficulty: 5
    text: Что такое **брашно**?
    options:
      - ссора или драка
      - еда, пища, кушанье
      - поле для битвы
      - вид ткани
      - тяжелая ноша
      - деталь упряжи
    correct_answer: 1
    explanation: '**Брашно** — пища, яства.'
  - id: q_vocabulary_200_79
    type: choice
    difficulty: 6
    text: 'Слово **брение** означает:'
    options:
      - бритье бороды
      - глина, грязь, прах
      - тяжелое дыхание
      - шумный разговор
      - вид молитвы
      - быстрое движение
    correct_answer: 1
    explanation: '**Брение** — глина или грязь (из которой сотворен человек).'
  - id: q_vocabulary_200_80
    type: choice
    difficulty: 3
    text: Что такое **вертеп**?
    options:
      - шумное сборище
      - пещера
      - высокий дом
      - лесной овраг
      - вид кукольного театра
      - глубокий колодец
    correct_answer: 1
    explanation: '**Вертеп** — пещера (где родился Христос). Также ящик для кукольного представления.'
  - id: q_vocabulary_200_81
    type: choice
    difficulty: 5
    text: 'Значение слова **вельми**:'
    options:
      - никогда
      - очень, весьма
      - скоро
      - напрасно
      - тайно
      - немного
    correct_answer: 1
    explanation: '**Вельми** — очень, весьма.'
  - id: q_vocabulary_200_82
    type: choice
    difficulty: 3
    text: Кто такие **волхвы**?
    options:
      - пастухи
      - мудрецы, чародеи, гадатели
      - воины
      - бедные странники
      - лесные звери
      - строители храмов
    correct_answer: 1
    explanation: '**Волхвы** — древние мудрецы, звездочеты.'
  - id: q_vocabulary_200_83
    type: choice
    difficulty: 6
    text: Что означает слово **вотще**?
    options:
      - всегда
      - напрасно, всуе
      - тайно
      - внезапно
      - громко
      - после всего
    correct_answer: 1
    explanation: '**Вотще** — напрасно, тщетно.'
  - id: q_vocabulary_200_85
    type: choice
    difficulty: 7
    text: Что такое **гаждание**?
    options:
      - долгое ожидание
      - порицание, хула, брань
      - угощение гостей
      - уход за садом
      - вид наказания
      - радостное событие
    correct_answer: 1
    explanation: '**Гаждание** — хула, ругань, поношение.'
  - id: q_vocabulary_200_86
    type: choice
    difficulty: 8
    text: 'Слово **гонезнути** означает:'
    options:
      - догнать кого-то
      - убежать, спастись бегством
      - громко кричать
      - начать охоту
      - упасть в яму
      - потерять память
    correct_answer: 1
    explanation: '**Гонезнути** — убежать, спастись (от «гнать»).'
  - id: q_vocabulary_200_94
    type: choice
    difficulty: 7
    text: 'Значение слова **кийждо**:'
    options:
      - кто-то один
      - всякий, каждый
      - никто
      - очень старый
      - чужой
      - лучший
    correct_answer: 1
    explanation: '**Кийждо** — каждый, всякий.'
  - id: q_vocabulary_200_96
    type: choice
    difficulty: 5
    text: Что такое **мамона**?
    options:
      - имя богини
      - земные блага, богатство
      - большая пещера
      - вкусная еда
      - вид одежды
      - шумный праздник
    correct_answer: 1
    explanation: '**Мамона** — богатство, земные сокровища (персонифицированное как идол).'