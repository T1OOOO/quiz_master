id: home_alone_part_1
title: Один дома (Часть 1)
description: Квиз по мотивам любимого новогоднего фильма
questions:
- id: q_home_alone_part_1_0_ha-q1
  type: choice
  text: Как звали главного героя?
  options:
  - Кевин
  - Базз
  - Фуллер
  - Гарри
  - Марв
  - Питер
  correct_answer: 0
  explanation: Главного героя зовут Кевин Маккаллистер. Эту роль исполнил Маколей
    Калкин, и она принесла ему мировую славу.
  correct_multi: null
- id: q_home_alone_part_1_1_ha-q2
  type: choice
  text: Куда улетела семья Маккаллистеров?
