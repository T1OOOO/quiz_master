id: 70192fca-79ee-40f5-a968-1838c4aaa052
title: 'Один дома: Сюжет'
description: Тонкости сценария, ключевые моменты и сюжетные повороты.
questions:
- id: 5bdd1f49-9131-4b3b-9c2b-b3c3309eeead
  type: choice
  text: Из-за чего Кевина случайно оставили дома в первый раз?
  options:
  - Ошибка в списке
  - Драка
  - Он проспал
  - Отключили свет
  - Проблемы с билетом
  - Забыли разбудить
  correct_answer: 3
  explanation: Из-за короткого замыкания во время грозы будильники сбросились, и семья проспала, собираясь в спешке.
- id: 7a207605-1b43-4cd8-9c97-2b116631a37e
  type: choice
  text: Где Кевин разделился с семьей в аэропорту во второй части?
  options:
  - У туалета
  - В магазине
  - В очереди
  - У гейта
  - У кассы
  - На стоянке
  correct_answer: 3
  explanation: Кевин побежал за человеком в похожем пальто и сел не на тот самолет.
- id: 5195f636-6ff6-4f71-82a9-f10db070d59d
  type: choice
  text: Куда улетел Кевин вместо Флориды во второй части?
  options:
  - В Нью-Йорк
  - В Майами
  - В Бостон
  - В Чикаго
  - В Лос-Анджелес
  - В Вашингтон
  correct_answer: 0
  explanation: Пока семья летела во Флориду, Кевин оказался в заснеженном Нью-Йорке.
- id: 50e35481-905a-4c7d-b004-de167df2309c
  type: choice
  text: Как Кевин оплачивал свои покупки в Нью-Йорке?
  options:
  - Чеком
  - Нашел кошелек
  - В долг
  - Наличными Базза
  - Картой папы
  - Своей копилкой
  correct_answer: 4
  explanation: У него была сумка отца с наличными и кредитной картой.
- id: b80bc7e5-1f65-4c58-8c5b-a4bdb00f098b
  type: choice
  text: С помощью чего Кевин пугал разносчика пиццы?
  options:
  - Петард
  - Фильма
  - Магнитофона
  - Собаки
  - Голоса
  - Маски
  correct_answer: 1
  explanation: Он использовал фрагменты из гангстерского фильма «Ангелы с грязными душами».
- id: 844f948f-af0a-4394-a9d8-971d7df10ba7
  type: choice
  text: Какое заведение Гарри и Марв планировали ограбить в Нью-Йорке?
  options:
  - Музей искусства
  - Банк
  - Ювелирный салон
  - Магазин игрушек
  - Отель
  - Частный особняк
  correct_answer: 3
  explanation: Они хотели украсть выручку из «Магазина игрушек Дункана».
- id: 8fb093f5-636b-422a-9124-705fcd27ee95
  type: choice
  text: Где мама Кевина нашла его в конце первого фильма?
  options:
  - В церкви
  - В подвале
  - Во дворе
  - У соседей
  - В гостиной
  - На чердаке
  correct_answer: 4
  explanation: Она вошла в дом и увидела Кевина в гостиной у наряженной елки.
- id: 75469e11-7d84-456f-a588-b33ddb078057
  type: choice
  text: У какой достопримечательности Кейт нашла Кевина в Нью-Йорке?
  options:
  - В Центральном парке
  - У Эмпайр-стейт
  - На Таймс-сквер
  - В Оружейной
  - У Статуи Свободы
  - У Рокфеллер-центра
  correct_answer: 5
  explanation: Она знала, что Кевин любит рождественские елки, и отправилась к самой большой в городе.
- id: f1aa1596-a033-437b-8f39-afd08897588c
  type: choice
  text: С помощью чего Кевин заставил персонал отеля поверить, что его отец рядом?
  options:
  - Диктофона
  - Двойника
  - Актера
  - Телефона
  - Записки
  - Манекена
  correct_answer: 0
  explanation: Он использовал Talkboy с записанным голосом отца в душе.
- id: c6f420ca-bdf0-44bb-81c8-8716beae76e1
  type: choice
  text: Как звали соседа, которого по ошибке посчитали за Кевина во время пересчета детей?
  options:
  - Митч Мерфи
  - Том
  - Билли
  - Питер
  - Джо
  - Сэм
  correct_answer: 0
  explanation: Любопытный соседский мальчик Митч копался в вещах в фургоне, и его голову посчитали в суматохе.
- id: 47768a9f-b876-4a33-b41f-75f02f6c30ca
  type: choice
  text: С кем Кевин разговаривает в церкви о важности семьи?
  options:
  - С мамой
  - Один
  - Со священником
  - Со стариком Марли
  - С хористом
  - С охранником
  correct_answer: 3
  explanation: Этот разговор помог Марли решиться позвонить сыну, а Кевину — перестать бояться.
- id: edbc4d62-11db-4d2d-b90d-f57ab983681f
  type: choice
  text: Какая «витрина» помогла полиции арестовать Гарри и Марва в первой части?
  options:
  - Видео
  - Записка
  - Фотография
  - Отпечатки
  - Затопленный дом
  - Свидетель
  correct_answer: 4
  explanation: Марв затапливал дома («Мокрые бандиты»), что стало неоспоримой уликой их серии краж.
- id: ef4ec802-97b6-4ce3-996c-2f0c58d3f252
  type: choice
  text: На что должны были пойти деньги из магазина Дункана?
  options:
  - Детской больнице
  - В приют
  - В фонд кино
  - Неизвестно
  - На ремонт
  - На подарки
  correct_answer: 0
  explanation: Это была благотворительная выручка для детской больницы Святой Анны.
- id: fb2342b7-de1c-43c2-992a-8950ff2fede1
  type: choice
  text: Что Кевин бросил в окно магазина игрушек?
  options:
  - Кирпич с запиской
  - Ботинок
  - Игрушку
  - Мяч
  - Камень
  - Кошелек
  correct_answer: 0
  explanation: Он разбил витрину кирпичом, к которому была привязана записка для Дункана.
- id: 20582cb6-f169-45b5-9202-2c71cc81ad9e
  type: choice
  text: Что символизируют горлицы в сюжете второй части?
  options:
  - Удачу
  - Дружбу
  - Любовь
  - Свободу
  - Рождество
  - Мир
  correct_answer: 1
  explanation: 'Дункан сказал: «Пока у вас по одной горлице, вы друзья навек».'
- id: 7dd55e15-0e06-46a6-ae5c-b0de99e4258e
  type: choice
  text: От чьего имени Кевин звонит в полицию в первой части?
  options:
  - Папы
  - Анонимно
  - Дяди
  - Своего
  - Бандита
  - Соседа Мерфи
  correct_answer: 5
  explanation: 'Он сказал: «Это Мерфи с 21-й улицы...».'
- id: dcae38d2-cfd4-4f86-9d66-0e9b54767cf6
  type: choice
  text: Что Кевин нанес на лицо перед тем, как закричать в зеркало?
  options:
  - Лосьон
  - Краску
  - Воду
  - Масло
  - Крем
  - Мыло
  correct_answer: 0
  explanation: Кевин нанес лосьон после бритья, который сильно щипал.
- id: 70378820-2a0f-41a2-9d46-3a5fc0f90d17
  type: choice
  text: Кем притворился Гарри, когда впервые зашел в дом Маккаллистеров?
  options:
  - Сантехником
  - Репортером
  - Почтальоном
  - Соседом
  - Полицейским
  - Рабочим
  correct_answer: 4
  explanation: Он надел форму офицера полиции, чтобы разузнать о защите дома.
- id: 70a413cf-021d-45be-9218-df001de394bc
  type: choice
  text: Во что Марв наступил босой ногой в доме?
  options:
  - В краску
  - В гвозди
  - В клей
  - В воду
  - В масло
  - В елочные игрушки
  correct_answer: 5
  explanation: Кевин рассыпал стеклянные игрушки под окном, через которое лез Марв.
- id: 243b645f-9c78-430f-9031-cc87f5120168
  type: choice
  text: Какая ловушка была последней перед парком во второй части?
  options:
  - Электричество
  - Трубы
  - Инструменты
  - Веревка в керосине
  - Мешки с цементом
  - Лестница
  correct_answer: 3
  explanation: Бандиты спускались по веревке, которую Кевин поджег.
