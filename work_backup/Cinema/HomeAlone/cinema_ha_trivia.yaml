id: 29bb649d-fe03-43a5-ac92-04c377d2a243
title: 'Один дома: Факты и Тайны'
description: Закулисье, технические секреты и невероятные совпадения.
questions:
- id: f11cce02-fbc2-44e7-82d7-436c84ef43e8
  type: choice
  text: Какое условие поставил Трамп для съемок в отеле «Плаза»?
  options:
  - Свое камео в фильме
  - Ремонт в лобби
  - Никаких детей в кадре
  - Бесплатную рекламу
  - Смену названия
  - Огромную сумму денег
  correct_answer: 0
  explanation: Дональд Трамп разрешил снимать в отеле только при условии, что он сам появится в кадре.
- id: 48d5e892-a07d-4947-8a5e-a3265eaeb4dc
  type: choice
  text: Существует ли на самом деле фильм «Ангелы с грязными душами»?
  options:
  - Это сериал
  - Да, это короткометражка
  - Нет, снят специально
  - Да, но он утерян
  - Это мультфильм
  - Да, классика 40-х
  correct_answer: 2
  explanation: Фрагменты гангстерского кино были сняты специально для «Один дома» за один день.
- id: 2c704e76-cf41-4631-ada0-bb38b33ef9c8
  type: choice
  text: Какой известный режиссер снял обе части фильма?
  options:
  - Гай Ричи
  - Джеймс Кэмерон
  - Тим Бертон
  - Крис Коламбус
  - Квентин Тарантино
  - Стивен Спилберг
  correct_answer: 3
  explanation: Крис Коламбус позже прославился съемками первых двух частей «Гарри Поттера».
- id: 2b2ed9c5-977f-4055-b863-7f3d05943679
  type: choice
  text: Как Дэниел Стерн (Марв) снимал сцену с настоящим тарантулом?
  options:
  - Паук был за стеклом
  - Он не боялся пауков
  - Через монтаж
  - Орал по-настоящему
  - Орал без звука
  - Это был муляж
  correct_answer: 4
  explanation: Актер изображал крик мимикой, чтобы не напугать живого паука; звук добавили позже.
- id: 2a6f8ea5-7ff2-4474-ab2d-0e383fdd1b1d
  type: choice
  text: Почему Джо Пеши (Гарри) избегал Маколея Калкина на площадке?
  options:
  - Чтобы тот его боялся
  - Маколей много шутил
  - Режиссер запретил
  - У них разные графики
  - Они поссорились
  - Пеши был слишком занят
  correct_answer: 0
  explanation: Джо Пеши хотел, чтобы юный актер действительно чувствовал страх перед бандитом для правдоподобия.
- id: a5b25eca-55b4-4bc3-a550-5afda0d28930
  type: choice
  text: Кто написал сценарий к «Один дома»?
  options:
  - Джон Хьюз
  - Джордж Лукас
  - Стивен Кинг
  - Дж.К. Роулинг
  - Гари Поттер
  - Крис Коламбус
  correct_answer: 0
  explanation: Джон Хьюз — легенда подросткового кино 80-х, создавший «Клуб "Завтрак"».
- id: db84279a-b940-440c-a036-fe7dac234ea0
  type: choice
  text: В каком штате находится реальный дом Маккаллистеров?
  options:
  - Нью-Йорк
  - Флорида
  - Калифорния
  - Огайо
  - Иллинойс
  - Техас
  correct_answer: 4
  explanation: Знаменитый дом расположен в городке Уиннетка, штат Иллинойс.
- id: 03b26e49-1612-4451-a53d-f08f366440fe
  type: choice
  text: В какой стране «Один дома» стал обязательной ТВ-традицией на Рождество?
  options:
  - Испания
  - Германия
  - Франция
  - Польша
  - Россия
  - Италия
  correct_answer: 3
  explanation: В Польше фильм настолько популярен, что его отсутствие в сетке вещания вызывало массовые протесты.
- id: 0af826fd-a975-44b9-a3e4-ad088b7f825b
  type: choice
  text: Кто в реальности является братом Маколея Калкина?
  options:
  - Актер Базза
  - Нет братьев
  - Продавец билетов
  - Один из бандитов
  - Актер Фуллера
  - Дублер Кевина
  correct_answer: 4
  explanation: Кузена Фуллера сыграл Киран Калкин, родной младший брат Маколея.
- id: fd94e7a3-e826-4023-97a9-6178598aca84
  type: choice
  text: Где на самом деле снимали сцены затопления подвала?
  options:
  - В павильоне Голливуда
  - С помощью компьютерной графики
  - В Нью-Йорке
  - В бассейне школы
  - В настоящем подвале
  - В гараже режиссера
  correct_answer: 3
  explanation: Подвал построили в бассейне местной закрытой школы, чтобы было удобно работать с водой.
- id: 07da3642-a2e9-46df-8c62-f823750b7545
  type: choice
  text: Какую травму получил Маколей Калкин от Джо Пеши во время репетиции сцены с дверью?
  options:
  - Растяжение
  - Ожог руки
  - Выбитый зуб
  - Настоящий укус пальца
  - Царапину на щеке
  - Ушиб колена
  correct_answer: 3
  explanation: Джо Пеши так вошел в роль, что во время угрозы «откусить палец» случайно прикусил его по-настоящему, оставив шрам.
- id: 90e87eb1-895a-45ac-ad76-c1123c578ba9
  type: choice
  text: Какая известная легенда гласит, что «Элвис Пресли» снялся в массовке фильма через 13 лет после своей смерти?
  options:
  - Водитель грузовика
  - Санта-Клаус
  - Прохожий в Нью-Йорке
  - Офицер в участке
  - Мужчина с бородой в аэропорту
  - Продавец билетов
  correct_answer: 4
  explanation: Фанаты Элвиса верят, что бородатый мужчина, стоящий за мамой Кевина в аэропорту — это постаревший Король.
- id: 8d797478-7999-4467-9ab9-f90d4c187105
  type: choice
  text: Из чего на самом деле были сделаны «стеклянные» елочные украшения, на которые наступает Марв?
  options:
  - Лед
  - Прозрачный воск
  - Пластик
  - Настоящее стекло
  - Карамельный сахар (леденцы)
  - Плотная бумага
  correct_answer: 4
  explanation: Для безопасности актера использовали «сахарное стекло», которое легко ломается и не режет кожу.
- id: ce74f575-f9a6-4a38-9a3e-b5f7d3270e56
  type: choice
  text: Какое техническое решение использовали для знаменитой сцены падения Марва с лестницы в подвал?
  options:
  - Компьютерная графика
  - Каскадер на тросах
  - Кукла
  - Это был робот
  - Падение на маты (скрытые)
  - Съемка снизу вверх
  correct_answer: 1
  explanation: Сложные трюки падений в фильме выполняли профессиональные каскадеры, которые рисковали здоровьем ради комедии.
- id: 47779496-fb52-4316-bbdf-aa7763779105
  type: choice
  text: Был ли Джо Пеши первым кандидатом на роль Гарри?
  options:
  - Нет, предлагали Аль Пачино
  - Да, он сам просился
  - Нет, это был Том Хэнкс
  - Да, роль писали под него
  - Нет, предлагали Робину Уильямсу
  - Нет, предлагали Роберту Де Ниро
  correct_answer: 5
  explanation: Продюсеры сначала хотели видеть в роли Гарри Роберта Де Ниро, но тот отказался.
- id: 117a0fc5-1698-40dc-9bfd-08159d5f0266
  type: choice
  text: Какая настоящая фобия была у Дэниела Стерна (Марва) во время съемок?
  options:
  - Боязнь темноты
  - Боязнь замкнутых пространств
  - Боязнь детей
  - Боязнь воды
  - Боязнь высоты
  - Боязнь пауков
  correct_answer: 5
  explanation: Хоть он и согласился посадить живого тарантула на лицо, актер в жизни очень боится пауков.
- id: a3c7a556-1d02-417a-9e3d-ac939885c783
  type: choice
  text: Почему Базз (Девин Рэтрей) называет своего паука в фильме Акселем?
  options:
  - Продюсер так назвал
  - Это имя режиссера
  - Просто красивое имя
  - В честь Акселя Роуза (Guns N’ Roses)
  - Аксель — это порода паука
  - Это имя соседа
  correct_answer: 3
  explanation: В 90-х Аксель Роуз был на пике популярности, и это имя добавило персонажу Базза «крутости».
- id: 039d0422-b750-4c83-b7e7-7d9f4d2a3d75
  type: choice
  text: Какое блюдо на самом деле ел Кевин, когда он смотрел «Ангелов с грязными душами»?
  options:
  - Пицца
  - Торт
  - Спагетти
  - Бургер
  - Жареная курица
  - Мороженое с огромным количеством топпингов
  correct_answer: 5
  explanation: Это был огромный сандей (мороженое), который Кевину никто не запрещал есть целый день.
- id: 861d5e1a-2c03-4bbf-b88a-db792a2c528f
  type: choice
  text: Как назывался план обороны дома, который нарисовал Кевин?
  options:
  - План Кевина
  - Смерть грабителям
  - План Альфа
  - Мой дом — моя крепость
  - Операция «Хо-Хо-Хо»
  - Операция «Ловушка»
  correct_answer: 4
  explanation: На чертеже Кевина в первом фильме красуется надпись «Operation Ho-Ho-Ho».
- id: 35577fde-2a42-4b98-83e9-60ed6699b702
  type: choice
  text: Какое «секретное» оружие Кевин использовал против Марва во второй части, сбросив его с крыши?
  options:
  - Кирпичи
  - Банки с краской
  - Мешки с цементом
  - Телевизор
  - Рояль
  - Сейф
  correct_answer: 0
  explanation: Кевин сбросил на голову Марва четыре кирпича, что в реальности было бы смертельным для любого человека.
