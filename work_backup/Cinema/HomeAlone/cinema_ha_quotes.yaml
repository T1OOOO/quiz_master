id: 0c1aa6c4-7286-48f8-83c2-8645f9c2d895
title: 'Один дома: Цитаты'
description: Самые известные фразы и диалоги из дилогии.
questions:
- id: 6d0e17e1-37f3-4644-8186-8186d3285b4f
  type: choice
  text: Что Кевин попросил у «Санты» на улице в первой части?
  options:
  - Новую приставку
  - Вернуть семью
  - Собаку
  - Кучу пиццы
  - Пневматику
  - Билет в Париж
  correct_answer: 1
  explanation: Кевин сказал, что ему не нужны подарки, лишь бы вся семья вернулась домой.
- id: 78481cef-3861-4e32-a74b-ed014b0c5eab
  type: choice
  text: Знаменитый отсчет гангстера Джонни из фильма на кассете?
  options:
  - Раз, два, и всё!
  - Один, два, три!
  - Считаю до пяти!
  - Десять, девять, огонь!
  - Время вышло!
  - Раз, два, десять!
  correct_answer: 5
  explanation: 'Джонни смухлевал: «I’m gonna give you to the count of ten... One, two... ten!».'
- id: a7472d42-4e30-4214-9de1-197f40a789d9
  type: choice
  text: Что кричит Базз в финале первого фильма?
  options:
  - Где мой паук?!
  - Где моя пицца?!
  - Кевин, ты герой!
  - Мама, он здесь!
  - Что ты сделал с комнатой?!
  - Я тебя убью!
  correct_answer: 4
  explanation: 'Фильм заканчивается воплем Базза: «Kevin, what did you do to my room?!».'
- id: 024d5b17-bb55-4df9-a312-be1f68887467
  type: choice
  text: Как Кевин назвал свои макароны с сыром в молитве перед ужином?
  options:
  - Почти домашние
  - Самые лучшие
  - Высокопитательные
  - Опасные
  - Очень вкусные
  - Золотистые
  correct_answer: 2
  explanation: 'Он произнес: «Bless this highly nutritious microwavable macaroni and cheese».'
- id: 54c6ee06-79b3-4c04-aebb-b7fbf2bfcc68
  type: choice
  text: Как Марв назвал голубей в Центральном парке?
  options:
  - Ангелы смерти
  - Курицы
  - Пернатые монстры
  - Серые дьяволы
  - Летающие крысы
  - Грязные птицы
  correct_answer: 4
  explanation: 'Марв в ужасе кричал: «Flying rats!» (Летающие крысы).'
- id: bfa0815b-b197-4a3e-b47b-dd9c802e573e
  type: choice
  text: 'Культовая фраза Джонни: «Оставь сдачу себе, ...»?'
  options:
  - Жалкий трус!
  - Старый дурак!
  - Счастливого Рождества!
  - Глупый малый!
  - Маленький вор!
  - Грязное животное!
  correct_answer: 5
  explanation: Фраза «Keep the change, ya filthy animal!» стала одной из самых цитируемых в кино.
- id: 721ff027-2d27-47b0-b9a2-635a9a5764f5
  type: choice
  text: Что кричит Кевин, когда понимает, что остался один?
  options:
  - Свобода!
  - Мне страшно!
  - Наконец-то тишина!
  - Помогите!
  - Я заставил семью исчезнуть!
  - Где все?
  correct_answer: 4
  explanation: 'Он с восторгом говорит: «I made my family disappear!».'
- id: 38b92329-7ab5-4374-a104-e616ca87984d
  type: choice
  text: Как Марв аргументировал название «Мокрые бандиты»?
  options:
  - Нас не поймать
  - Мы скользкие
  - Мы смываем следы
  - Мы грабим в дождь
  - Мы из службы спасения
  - Мы оставляем воду включенной
  correct_answer: 5
  explanation: Марв затыкал раковины и включал воду в каждом ограбленном доме.
- id: ca46b464-808f-42a0-a1a5-59c7f9526491
  type: choice
  text: Как дядя Фрэнк назвал Кевина на кухне?
  options:
  - Обуза
  - Маленький тунеядец
  - Вредитель
  - Наглец
  - Глупый мальчишка
  - Маленький монстр
  correct_answer: 1
  explanation: 'Фрэнк грубо крикнул: «Look what you did, you little jerk!».'
- id: c55421f0-afa1-47c6-9720-b3ab02315599
  type: choice
  text: Что сказал Кевин маме, когда она вошла в дом в конце фильма?
  options:
  - Я проголодался
  - Прости меня
  - Ты опоздала
  - Случилось чудо
  - Я защитил дом
  - Где остальные?
  correct_answer: 3
  explanation: 'Увидев маму, он радостно сказал: «Mom, it’s a miracle!».'
- id: f483f37d-831a-4e3e-9448-f20ccb31c81a
  type: choice
  text: Какую фразу Гарри говорит Марву, когда они впервые подъезжают к дому Маккалистеров?
  options:
  - Мы здесь всё обчистим
  - Поехали дальше
  - Это наш золотой билет
  - Смотри, какая красота
  - Здесь живут богачи
  - Тише, нас заметят
  correct_answer: 2
  explanation: Гарри называет дом «silver tuna» (серебряный тунец) или «золотой билет», считая его главной целью.
- id: 5935cf07-14d5-4da6-aa32-c79d9971b279
  type: choice
  text: Какое «обещание» Кевин дает старику Марли в церкви?
  options:
  - Защитить дом
  - Помыть посуду
  - Не бояться его
  - Вымыть полы
  - Не грабить магазины
  - Прийти еще раз
  correct_answer: 2
  explanation: Кевин признается, что боялся Марли из-за слухов, но обещает больше не бояться.
- id: 7e60c0f0-7e98-4558-91e3-1520bea9bace
  type: choice
  text: Какое слово кричит Кевин в ванной, прижав руки к лицу после использования лосьона после бритья?
  options:
  - Мама!
  - Горю!
  - Ой!
  - А-а-а-а! (Крик)
  - Помогите!
  - Свобода!
  correct_answer: 3
  explanation: Этот крик стал одним из самых узнаваемых образов в истории кино и красуется на всех постерах фильма.
- id: 07cbb74f-67d4-45c4-ab11-977fcb6855da
  type: choice
  text: Что кричит Гарри, когда понимает, что Кевин вызвал полицию (в первом фильме)?
  options:
  - Тишина!
  - Маленький гаденыш!
  - Это ловушка!
  - Бежим!
  - Нам конец!
  - Прощай, Марв!
  correct_answer: 1
  explanation: Осознав, что ребенок их перехитрил, Гарри выходит из себя.
- id: c6b305a6-3ab1-4f86-88ba-652e4cfbf847
  type: choice
  text: Как Марв называет их дуэт во второй части фильма?
  options:
  - Крутые парни
  - Короли грабежа
  - Тени во тьме
  - Липкие бандиты
  - Звери Нью-Йорка
  - Мокрые бандиты
  correct_answer: 3
  explanation: 'Марв решил сменить имидж: «We’re the Sticky Bandits now!», используя перчатку с клеем для кражи монет.'
- id: d6fe4ba3-627b-4bc3-b59a-d5381ced948a
  type: choice
  text: Что говорит консьерж (Тим Карри) Кевину, когда ловит его в отеле «Плаза»?
  options:
  - На выход!
  - Добро пожаловать!
  - Счастливого Рождества!
  - Где твои родители?
  - Сэр, вы забыли сдачу
  - Попался, малыш!
  correct_answer: 2
  explanation: 'Даже будучи злорадным, он сохраняет профессиональную вежливость отеля: «Enjoy your stay!».'
- id: 26faf93c-1c89-4441-982b-47ef4d1a853c
  type: choice
  text: Какую фразу Кевин говорит в конце второй части, когда встречает птичницу в парке?
  options:
  - Я нашел дом
  - Улетай отсюда
  - Спасибо за помощь
  - Я тебя не забуду
  - Вот твой подарок
  - Ты не одна
  correct_answer: 3
  explanation: Кевин дарит ей одну из двух горлиц, символ вечной дружбы.
- id: 5310d57e-3fda-466b-9761-3ee3f9b0f952
  type: choice
  text: Что Марв говорит Гарри, когда тот застревает в окне (во второй части)?
  options:
  - Гарри, почему ты в платье?
  - Прыгай!
  - Гарри, я иду!
  - Руки вверх!
  - Не двигайся!
  - Какой красивый вид!
  correct_answer: 0
  explanation: Гарри из-за взрыва и красок выглядит довольно нелепо, что вызывает удивление Марва.
- id: 888331dd-4106-4330-b913-f7d00cb6344a
  type: choice
  text: Какую фразу повторяет телевизор в отеле, пугая персонал?
  options:
  - Стой, где стоишь!
  - Я тебя вижу!
  - Позовите полицию!
  - Оставь сдачу себе, грязное животное!
  - Кофе готов!
  - Убирайтесь вон!
  correct_answer: 3
  explanation: Кевин снова использует фильм «Ангелы с более грязными душами», чтобы выгнать сотрудников из номера.
- id: 684b0409-a690-42dd-b559-a15a1d53d332
  type: choice
  text: Что говорит отец Кевина в финале второй части, увидев счет из отеля?
  options:
  - Это лучшее Рождество!
  - Где мои деньги?!
  - Кевин, ты молодец!
  - Мы возвращаемся в Париж!
  - Я увольняюсь!
  - Кевин, ты потратил на обслуживание номеров 967 долларов?!
  correct_answer: 5
  explanation: 'Фильм заканчивается воплем Питера Маккалистера: «Kevin, you spent 967 dollars on room service?!».'
