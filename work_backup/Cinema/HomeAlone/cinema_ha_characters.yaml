id: 8cbd78b6-e4de-43fa-b545-5963986c4861
title: 'Один дома: Персонажи'
description: Все о героях, бандитах и эпизодических персонажах.
questions:
- id: 195e25b7-3a32-446c-8c8f-fdd5c60b3e3e
  type: choice
  text: Чем Кевин выстрелил в Базза в его комнате?
  options:
  - Рогаткой
  - Снежком
  - Луком
  - Петардой
  - Пневматикой
  - Дартсом
  correct_answer: 4
  explanation: Кевин использовал пневматическое ружье Базза, когда забрался в его комнату.
- id: 2167de3b-722e-4068-85d5-097303dee668
  type: choice
  text: Как звали дядю Кевина, чей дом в Нью-Йорке ремонтировался?
  options:
  - Роб
  - Питер
  - Джон
  - Фрэнк
  - Артур
  - Стэн
  correct_answer: 0
  explanation: Дом принадлежал дяде Робу и тете Джорджетт.
- id: b1f09d2d-3818-4e63-b407-8797699820b0
  type: choice
  text: Что Кевин высыпал на бандитов в парке для привлечения птиц?
  options:
  - Птичий корм
  - Попкорн
  - Семечки
  - Овсянку
  - Крошки хлеба
  - Сахар
  correct_answer: 0
  explanation: Кевин использовал птичий корм, который ему дала Леди с голубями.
- id: 8ef2af58-d40c-47cd-974c-8b4f1ceca27e
  type: choice
  text: На каком инструменте играл «Король Польки» Гас Полински?
  options:
  - Тромбон
  - Кларнет
  - Труба
  - Аккордеон
  - Саксофон
  - Флейта
  correct_answer: 1
  explanation: Гас Полински (Джон Кэнди) играл на кларнете.
- id: acbcac42-9c9b-45fc-9669-a733d21bc3eb
  type: choice
  text: Кто из бандитов придумал название «Мокрые бандиты»?
  options:
  - Гас
  - Фуллер
  - Марв
  - Кевин
  - Гарри
  - Базз
  correct_answer: 2
  explanation: Марв гордился этим названием, так как оставлял воду включенной во всех домах.
- id: 86cc7184-0b58-4dda-a35b-f0a0e9f8fb8b
  type: choice
  text: Какое слово кричит мама, когда понимает, что Кевина забыли?
  options:
  - Где он?
  - О боже!
  - Питер!
  - Нет!
  - Кевин!
  - Помогите!
  correct_answer: 4
  explanation: Крик «КЕВИН!» стал визитной карточкой Кейт Маккаллистер.
- id: 3efae938-a017-4ba9-a9c8-8362ecc4b751
  type: choice
  text: До скольки считает гангстер Джонни, прежде чем открыть огонь?
  options:
  - До трех
  - До пяти
  - До ста
  - До двенадцати
  - До десяти
  - До семи
  correct_answer: 4
  explanation: 'Джонни говорит: «Я дам тебе десять секунд... раз, два... десять!».'
- id: 819c1f9a-5b6b-4c55-b777-4c45db39e9a6
  type: choice
  text: Кто сыграл кузена Фуллера (брат Маколея Калкина в жизни)?
  options:
  - Николас Кейдж
  - Рори Калкин
  - Шон Пенн
  - Элайджа Вуд
  - Кристиан Слейтер
  - Киран Калкин
  correct_answer: 5
  explanation: Роль Фуллера исполнил младший брат Маколея — Киран Калкин.
- id: 850416c2-b110-4219-99f9-2e2d5d6d4301
  type: choice
  text: Какое прозвище дети дали соседу Марли в первом фильме?
  options:
  - Гринч
  - Старый дед
  - Убийца с лопатой
  - Молчаливый Боб
  - Злой дворник
  - Снежный человек
  correct_answer: 2
  explanation: Базз называл его «Убийца с лопатой из Саут-Бенда».
- id: a34ba6a4-bef7-48e4-b471-97957a6819d1
  type: choice
  text: Кто показал Кевину дорогу в лобби отеля «Плаза»?
  options:
  - Майкл Джексон
  - Дональд Трамп
  - Том Круз
  - Стив Джобс
  - Билл Гейтс
  - Клинт Иствуд
  correct_answer: 1
  explanation: Кевин спрашивает дорогу у Дональда Трампа, который тогда владел отелем.
- id: 309904ec-5860-46a0-a54f-f1200934cdae
  type: choice
  text: Кто на самом деле был на фото «подружки Базза»?
  options:
  - Собака в парике
  - Дочь режиссера
  - Случайная прохожая
  - Девочка-модель
  - Сын арт-директора
  - Сам Маколей
  correct_answer: 4
  explanation: На фото был мальчик в парике, так как режиссер не хотел высмеивать реальную девочку.
- id: 27facf7e-e71a-4d7f-a890-5cbc0e1ebbe1
  type: choice
  text: Как звали актрису, сыгравшую Леди с голубями?
  options:
  - Мэрил Стрип
  - Сьюзан Сарандон
  - Хелен Миррен
  - Кэтрин О'Хара
  - Джуди Денч
  - Бренда Фрикер
  correct_answer: 5
  explanation: Роль исполнила оскароносная актриса Бренда Фрикер.
- id: 9e7ba5c6-4361-4339-bc15-5404926d6354
  type: choice
  text: Как дядя Фрэнк назвал Кевина после инцидента с пиццей?
  options:
  - Наглец
  - Ребенок
  - Идиот
  - Монстр
  - Глупец
  - Тунеядец
  correct_answer: 5
  explanation: 'Фрэнк крикнул: «Слушай сюда, ты, маленький тунеядец!» (little jerk).'
- id: ddb26033-7e1f-4339-9dd9-aaab63da1aca
  type: choice
  text: Как звали тарантула Базза (согласно книгам и играм)?
  options:
  - Пинки
  - Борис
  - Аксель
  - Рекс
  - Спайди
  - Сэр Гектор
  correct_answer: 2
  explanation: В новеллизации упоминается имя Аксель (Axl).
- id: 43a1bd1f-16e9-49b0-9bb5-f68d7d641c65
  type: choice
  text: Кем работал мистер Хектор (Тим Карри) в отеле «Плаза»?
  options:
  - Лифтером
  - Носильщиком
  - Консьержем
  - Поваром
  - Охранником
  - Директором
  correct_answer: 2
  explanation: Тим Карри сыграл подозрительного консьержа отеля.
- id: 2ef78b36-4fa5-4c38-ad9c-eab73738067e
  type: choice
  text: Что Кевин «подарил» носильщику Седрику вместо чаевых?
  options:
  - Конфету
  - Жвачку
  - Улыбку
  - Печенье
  - Монету
  - Tic-Tac
  correct_answer: 1
  explanation: Кевин дал ему палочку жвачки (Fruit Stripe).
- id: 925064ae-c678-4e95-88d8-dcfef902bab4
  type: choice
  text: Что подарил Кевину владелец магазина игрушек мистер Дункан?
  options:
  - Двух горлиц
  - Набор солдатиков
  - Модель самолета
  - Бесплатную пиццу
  - Железную дорогу
  - Золотую карту
  correct_answer: 0
  explanation: Он подарил Кевину двух фарфоровых горлиц — символ дружбы.
- id: 5e55f9b2-6f79-4ec2-bdd6-4b318a994543
  type: choice
  text: Какая отличительная черта была у бандита Гарри?
  options:
  - Хромота
  - Золотой зуб
  - Рыжая борода
  - Шрам на лбу
  - Очки
  - Татуировка
  correct_answer: 1
  explanation: У Гарри сверкал золотой передний зуб.
- id: fff50f20-3de1-49d4-8bc0-1a3f660bf439
  type: choice
  text: Почему Марв бегал босиком по дому Маккаллистеров?
  options:
  - Потерял в снегу
  - Снял в ловушке
  - Украли
  - Так тише
  - Традиция
  - Было жарко
  correct_answer: 1
  explanation: Он потерял обувь в «липкой» ловушке на лестнице в подвал.
- id: 31afc077-b993-4c6d-a8b3-30f97d2d4d28
  type: choice
  text: Куда улетела семья Кевина в первом фильме?
  options:
  - В Нью-Йорк
  - В Париж
  - В Токио
  - В Рим
  - В Лондон
  - Во Флориду
  correct_answer: 1
  explanation: Семья отправилась на рождественские каникулы в Париж.
