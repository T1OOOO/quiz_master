  correct_answer: 0
  explanation: Пока Кевин наслаждался роскошью «Плазы», его семья страдала в довольно посредственном Villa Dolphin в Майами.
- id: ca8f7b24-1313-4ba7-9e76-766c61fd2d79
  type: choice
  text: Какой известный политик (и будущий президент США) исполнил эпизодическую роль в «Один дома 2»?
  options:
