id: 4c921464-b55a-4335-b55f-2987c7b653ec
title: 'Один дома: Уровень Эксперт'
description: Сложные вопросы для настоящих фанатов серии.
questions:
- id: 537c70b1-67a7-4b12-b67b-2cebabfd8514
  type: choice
  text: Какая авиакомпания перевозила семью Маккаллистеров?
  options:
  - Pan Am
  - Lufthansa
  - United
  - American Airlines
  - Air France
  - Delta
  correct_answer: 3
  explanation: В обоих фильмах на билетах и самолетах виден логотип American Airlines.
- id: db810420-2299-4a00-9be8-d5439e45e269
  type: choice
  text: Зубную пасту какой марки покупал Кевин в первом фильме?
  options:
  - Blend-a-med
  - Aquafresh
  - Colgate
  - Crest
  - Oral-B
  - Sensodyne
  correct_answer: 2
  explanation: В сцене в магазине Кевин спрашивает, одобрена ли паста Colgate ассоциацией стоматологов.
- id: d6d71778-138d-4d64-adac-31ea3116576f
  type: choice
  text: Какую скульптуру Кевин постоянно задевает на машине в первой части?
