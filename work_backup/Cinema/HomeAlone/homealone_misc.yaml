- id: d0d7f553-2828-4a14-91db-70026061857a
  type: choice
  text: Что Кевин оставил на кровати Базза во время обыска его комнаты?
  options:
  - Деньги
  - Фотографию подружки Базза
  - Петарды
  - Дохлую мышь
  - Зубную щетку
  - Журнал Playboy
  correct_answer: 1
  explanation: 'Кевин находит фото и говорит: «Buzz, your girlfriend... Woof!». К слову, на фото был загримированный мальчик.'
- id: 31c5b3a1-4c2c-422f-a6d8-4dffa70f0063
  type: choice
  text: Какая игрушка помогла Кевину имитировать присутствие взрослых, когда грабители в первый раз подошли к дому?
  options:
