id: 849d4021-3e60-44f0-88ab-8e6133199152
title: 'Один дома: Ловушки и Гаджеты'
description: Культовые предметы, хитроумные ловушки и технические средства Кевина.
questions:
- id: 1a439a47-bff8-4ed2-b2df-75452ed6f55e
  type: choice
  text: Как назывался диктофон Кевина во втором фильме?
  options:
  - Sound Blaster
  - Talkboy
  - Mini Disc
  - Voice Master
  - Recorder Pro
  - Echo Junior
  correct_answer: 1
  explanation: Кассетный диктофон Talkboy стал невероятно популярен после выхода фильма.
- id: 1f6bd4e9-0101-4214-87a2-38bced90022d
  type: choice
  text: Чем Кевин нагрел дверную ручку в первой части?
  options:
  - Утюгом
  - Обогревателем
  - Кипятком
  - Электроплиткой
  - Свечой
  - Паяльной лампой
  correct_answer: 3
  explanation: Кевин привязал к внутренней ручке двери электрическую плитку-розжиг.
- id: 8ed2948f-9989-4a22-964c-8184df52b951
  type: choice
  text: Куда упал утюг на голову Марву?
  options:
  - В ванную
  - В подвал
  - В спальню
  - В гараж
  - На чердак
  - В кухню
  correct_answer: 1
  explanation: Утюг упал на голову Марву, когда тот тянул за веревочку в прачечной подвала.
- id: 79b29201-a25a-46dc-bdb7-c836ceecb6e5
  type: choice
  text: Какую статую постоянно сбивают машины у дома?
  options:
  - Гнома
  - Собаки
  - Льва
  - Орла
  - Ангела
  - Жокея
  correct_answer: 5
  explanation: Статуя жокея с фонарем у подъезда — постоянная жертва водителей.
- id: 260f0052-1732-4c5d-8d0c-8761a15cf014
  type: choice
  text: Какую пиццу Кевин всегда заказывал для себя?
  options:
  - Мясную
  - Пепперони
  - Маргариту
  - Сырную
  - Грибную
  - Гавайскую
  correct_answer: 3
  explanation: Кевин любил «просто сырную» пиццу и не терпел, когда на нее что-то кладут.
- id: 2b9be4e6-84c8-48fc-9e6a-45a65c80ca0a
  type: choice
  text: Что Кевин разлил на ступеньках к подвалу?
  options:
  - Мед
  - Краску
  - Сок
  - Клей
  - Воду
  - Масло
  correct_answer: 3
  explanation: Кевин разлил липкий клей, из-за которого Марв потерял ботинки.
- id: 3c988678-046b-4457-ab88-8bb1b48e9928
  type: choice
  text: Какое устройство подпалило голову Гарри?
  options:
  - Зажигалка
  - Фен
  - Плита
  - Духовка
  - Лампа
  - Паяльная лампа
  correct_answer: 5
  explanation: Кевин установил газовую горелку над дверью, которая сработала при открытии.
- id: 187afe07-d492-41e5-88f5-47fb1cbc430b
  type: choice
  text: Как назывался вымышленный фильм, который смотрел Кевин?
  options:
  - Убийцы в ночи
  - Тени города
  - Кровавое рождество
  - Гангстерский рай
  - Ангелы с грязными душами
  - Пули и слезы
  correct_answer: 4
  explanation: «Angels with Filthy Souls» — пародия на гангстерские фильмы сороковых.
- id: 7751f545-4b05-42a2-9b5b-8bdd74686c6c
  type: choice
  text: Что Кевин бросал с лестницы в первой части?
  options:
  - Бутылки
  - Книги
  - Банки с краской
  - Гантели
  - Подушки
  - Чемоданы
  correct_answer: 2
  explanation: Банки с краской на веревках — одна из самых болезненных ловушек.
- id: 2c0d974b-acde-44a3-b405-a34a0bcf0360
  type: choice
  text: На какой предмет Марв наступил ногой в подвале?
  options:
  - Гвоздь
  - Кнопку
  - Скрепку
  - Иголку
  - Шип
  - Стекло
  correct_answer: 0
  explanation: Гвоздь был вбит в ступеньку, и Марв наступил на него всей стопой.
- id: 3cb2e594-e32a-4113-a6ef-d7b7ed61551a
  type: choice
  text: На чем Кевин рисовал свой план обороны во второй части?
  options:
  - На карте города
  - На доске
  - На чертежной бумаге
  - На салфетке
  - На стене
  - На газете
  correct_answer: 0
  explanation: План «Operation Ho Ho Ho» был нарисован на большой карте Нью-Йорка.
- id: db319534-ea3b-41df-9e3e-50333dd160e6
  type: choice
  text: Сколько кирпичей Кевин бросил в Марва с крыши?
  options:
  - Шесть
  - Один
  - Три
  - Пять
  - Четыре
  - Два
  correct_answer: 4
  explanation: Кевин методично бросил четыре кирпича, и все попали в цель.
- id: 81e0d487-a1d2-4baa-9afc-4ed0113784ba
  type: choice
  text: Чем Кевин облил бандитов в строящемся доме?
  options:
  - Краской
  - Известью
  - Водой
  - Песком
  - Клеем
  - Бетоном
  correct_answer: 1
  explanation: Он уронил на них мешки с белой строительной смесью (известью).
- id: d0af924c-7910-4362-9c09-c47e6a890fab
  type: choice
  text: Какой прибор Кевин использовал, чтобы видеть коридор отеля?
  options:
  - Камеру
  - Лупу
  - Магнитофон
  - Фонарик
  - Зеркало
  - Перископ
  correct_answer: 4
  explanation: Он выставил зеркало в дверной проем, чтобы следить за консьержем.
- id: a2263bb8-a4f4-4f81-9a22-2011fc147c8f
  type: choice
  text: К чему Кевин подключил дверную ручку во втором фильме?
  options:
  - К аккумулятору
  - К батарейкам
  - Ни к чему
  - К сварке
  - К плите
  - К розетке
  correct_answer: 3
  explanation: Он использовал дуговой сварочный аппарат, чтобы ударить током Марва.
- id: c8c81a69-5d37-4253-9771-0a2caf7c9a2c
  type: choice
  text: Одобрение какой ассоциации искал Кевин для зубной щетки?
  options:
  - Врачей
  - Мира
  - Гигиены
  - Стоматологов
  - Америки
  - Ученых
  correct_answer: 3
  explanation: 'Он спрашивал аптекаря: «Одобрена ли эта щетка Американской ассоциацией стоматологов?».'
- id: 657ed110-436d-4765-aec7-20df8409fd16
  type: choice
  text: Что упало на бандитов, когда они открыли дверь в комнату?
  options:
  - Сейф
  - Шкаф
  - Ящик с инструментами
  - Рояль
  - Кровать
  - Стеллаж
  correct_answer: 2
  explanation: Тяжелый металлический ящик с инструментами скатился по лестнице прямо в дверь.
- id: d02c3cbd-4b1b-4d40-b4b3-3ebd2d0c577d
  type: choice
  text: С помощью чего Кевин вызвал полицию к парку?
  options:
  - Свистка
  - Фейерверков
  - Крика
  - Сирены
  - Рации
  - Фонаря
  correct_answer: 1
  explanation: Он зажег связку петард и ракет в парке, чтобы привлечь патруль.
- id: 15c91271-343e-4ab5-8650-eed6e04fb4dd
  type: choice
  text: Что Кевин рассыпал на полу во второй части?
  options:
  - Макароны
  - Монеты
  - Крупу
  - Шарики
  - Бусины
  - Пуговицы
  correct_answer: 3
  explanation: Стеклянные шарики (Marbles) заставили бандитов скользить и падать.
- id: 6a811aa9-fef5-4280-8549-58d6d9cdc044
  type: choice
  text: Как назывался мост в Центральном парке, где Кевин встретил Леди?
  options:
  - Каменный
  - Красный
  - Зеленый
  - Манхэттенский
  - Гэпстоу
  - Бруклинский
  correct_answer: 4
  explanation: Gapstow Bridge — знаменитый мостик, где произошла их первая добрая встреча.
