global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/quiz-master-alerts.yml

scrape_configs:
  - job_name: "quiz-master-server"
    metrics_path: /metrics
    static_configs:
      - targets:
          - server:8090

  - job_name: "quiz-master-auth"
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth:8092

  - job_name: "quiz-master-storage"
    metrics_path: /metrics
    static_configs:
      - targets:
          - storage:8093

  - job_name: "blackbox-http"
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - http://server:8090/readyz
          - http://auth:8092/readyz
          - http://storage:8093/readyz
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
